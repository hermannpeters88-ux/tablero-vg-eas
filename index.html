// RENDER: Verónica Card (Directora Administrativa)
// ══════════════════════════════════════════════════
function renderVeroCard(){
  const randy = appData.team.find(m=>m.id==="randy");
  const color = MEMBERS_CONFIG.vero.color;
  const detalleTasks = getDetalleForMember("Randy");
  const tareasV = getTareasVariasHoy("Randy");

  // Score REAL (idéntico al podio del ranking de Randy)
  const realScores = window._realScores || computeRealScores() || {};
  const veroScoreReal = realScores.vero || 0;
  const veroPct = veroScoreReal; // mantener nombre para no romper el resto
  const veroMonthProportional = toMonthProportional(veroScoreReal);
  const validDet = detalleTasks.map(t=>({...t,_name:getTaskName(t)})).filter(t=>t._name);
  const status = getStatus(veroScoreReal);
  const todayDone = validDet.filter(t=>t.todayChecked).length;

  let html=`<div class="person-card" style="animation-delay:150ms">
    <div class="accent-top" style="background:linear-gradient(90deg,${color},${color}44)"></div>
    <div class="person-header">
      ${photoRing('vero', veroScoreReal, 90, 6)}
      <div class="info">
        <div class="name">Verónica González</div>
        <div class="role">Directora Administrativa</div>
        <span class="unit-tag" style="background:${color}22;color:${color}">VG ADMINISTRACIÓN</span>
        <span class="unit-tag" style="background:linear-gradient(135deg,#F5C518,#e8782a);color:#fff;margin-left:6px;border:none">👑 DIRECTORA</span>
      </div>
      <div class="big-pct">
        <div class="pct-num" style="color:${status.color}">${veroScoreReal}%</div>
        <span class="status-label" style="background:${status.bg};color:${status.color}">● ${status.label}</span>
      </div>
    </div>
    <div style="padding:0 28px 4px">${renderMonthProgressBar(veroMonthProportional, { label:"📆 Avance del mes — VG Administración (Randy)", compact:true, personaId:'vero', scoreReal: veroScoreReal })}</div>
    ${(function(){const r=renderProductividadReloj({compact:true});return r?`<div style="padding:0 28px 4px">${r}</div>`:"";})()}
    <div id="dual-gauge-vero" style="padding:0 28px 4px">${renderDualGauges('vero', true)}</div>
    <div class="divider"></div>`;

  // Show Randy's supervision
  html+=`<div class="task-section">
    <div class="section-title"><span class="icon">👥</span> Supervisión — Randy Peters <span class="src-tag">Score Real</span></div>
    <div class="supervision-grid">
      <div class="sup-mini">
        ${MEMBER_PHOTOS.randy?`<img src="${MEMBER_PHOTOS.randy}" alt="Randy">`:''}
        <div class="sup-info">
          <div class="sup-name">Randy Peters</div>
          <div class="sup-pct" style="color:${status.color}">${veroScoreReal}%</div>
        </div>
      </div>
    </div>
  </div>
  <div class="divider"></div>`;

  // Tareas diarias de Randy (del detalle con nombres resueltos)
  const veroValidDetalle = detalleTasks
    .map(t=>({...t, _name: getTaskName(t)}))
    .filter(t=>t._name);
  const veroValidDone = veroValidDetalle.filter(t=>t.todayChecked).length;
  if(veroValidDetalle.length>0){
    html+=`<div class="task-section">
      <div class="section-title"><span class="icon">📌</span> Tareas diarias Randy (${veroValidDone}/${veroValidDetalle.length})</div>`;
    veroValidDetalle.slice(0,8).forEach(task=>{
      const ws=getStatus(task.weekPct);
      html+=`<div class="task-row">
        <div class="task-name">${task._name}</div>
        <div class="progress-bar" style="width:70px"><div class="progress-fill" style="width:${task.weekPct}%;background:${ws.color}"></div></div>
        <span class="task-pct" style="color:${ws.color}">${task.weekPct}%</span>
        <span class="task-check" style="background:${task.todayChecked?'#10b981':'#d1cce8'};color:${task.todayChecked?'#fff':'var(--text-dim)'}">
          ${task.todayChecked?'✓':'—'}</span>
      </div>`;
    });
    html+=`</div><div class="divider"></div>`;
  }

  // Tareas de Randy (desde API separada)
  const rtpVero = appData.randyTareasPend;
  if(rtpVero && rtpVero.total>0){
    html+=`<div class="task-section">
      <div class="section-title"><span class="icon">📋</span> Tareas Randy — ${rtpVero.total} total (${rtpVero.pctRealizado}% completado)</div>
      <div style="display:flex;gap:8px;margin-bottom:10px">
        <div style="background:#ef444422;border-radius:6px;padding:6px 10px;flex:1;text-align:center">
          <div style="font-size:1rem;font-weight:800;color:#ef4444;font-family:'Space Mono',monospace">${rtpVero.pendientes}</div>
          <div style="font-size:.5rem;color:var(--text-dim);font-weight:700;text-transform:uppercase">Pend.</div>
        </div>
        <div style="background:#f59e0b22;border-radius:6px;padding:6px 10px;flex:1;text-align:center">
          <div style="font-size:1rem;font-weight:800;color:#f59e0b;font-family:'Space Mono',monospace">${rtpVero.enProceso}</div>
          <div style="font-size:.5rem;color:var(--text-dim);font-weight:700;text-transform:uppercase">Proceso</div>
        </div>
        <div style="background:#10b98122;border-radius:6px;padding:6px 10px;flex:1;text-align:center">
          <div style="font-size:1rem;font-weight:800;color:#10b981;font-family:'Space Mono',monospace">${rtpVero.realizadas}</div>
          <div style="font-size:.5rem;color:var(--text-dim);font-weight:700;text-transform:uppercase">Hechas</div>
        </div>
      </div>`;
    const vPendTasks = (rtpVero.tareas||[]).filter(t=>!t.realizada).slice(0,4);
    vPendTasks.forEach(t=>{
      const esColor = t.enProceso ? {color:"#f59e0b",bg:"#f59e0b22"} : {color:"#ef4444",bg:"#ef444422"};
      html+=`<div class="tv-row">
        <span class="tv-tag" style="background:${esColor.bg};color:${esColor.color}">${t.estado}</span>
        <span class="tv-tarea">${t.tarea}</span>
      </div>`;
    });
    html+=`</div>`;
  }

  // (Secciones "Alertas del equipo" y "Tareas varias hoy" removidas — no aportan info útil en la card de Vero)

  // ── GESTIÓN DE COBROS — Cartera VG Administración ──
  html += renderCobrosCartera();

  html+=`</div>`;
  return html;
}

// RENDER: Rody Card (Ejecutivo Contable + Clientes)
// ══════════════════════════════════════════════════
function renderRodyCard(member){
  const cfg = MEMBERS_CONFIG[member.id]||{};
  const color = cfg.color||"#10b981";
  const stats = getMemberWeekStats(member);
  const detalleTasks = getDetalleForMember("Rody");
  const tareasV = getTareasVariasHoy("Rody");

  // Get Rody's clients from clientes data
  const rodyClientes = (appData.clientes?.clientes||[]).filter(c=>
    c.ejecutivo.toLowerCase().includes("rodi")||c.ejecutivo.toLowerCase().includes("rody")
  );
  const clienteAvg = rodyClientes.length>0
    ? Math.round(rodyClientes.reduce((s,c)=>s+c.avancePct,0)/rodyClientes.length) : 0;

  // Calcular displayPct desde detalle real (mantenido por compatibilidad)
  const rodyValidDet = detalleTasks.map(t=>({...t,_name:getTaskName(t)})).filter(t=>t._name);
  const rodyDetalleAvg = rodyValidDet.length>0
    ? Math.round(rodyValidDet.reduce((s,t)=>s+(t.weekPct||0),0)/rodyValidDet.length)
    : 0;
  // Score REAL (idéntico al podio del ranking y demás cards)
  const realScores = window._realScores || computeRealScores() || {};
  const displayPct = realScores.rody != null ? realScores.rody : Math.max(stats.avgPct, rodyDetalleAvg);
  const status = getStatus(displayPct);
  const todayDone = rodyValidDet.filter(t=>t.todayChecked).length;

  // Detectar si actualizó hoy
  const rodyHasUpdated = (()=>{
    if(rodyValidDet.length===0) return true;
    if(window._dailyDataBroken) return true;
    return rodyValidDet.some(t=>t.todayChecked || (t.weekPct||0)>0);
  })();
  const rodyNoUpdBadge = !rodyHasUpdated ? 
    `<span style="display:inline-block;margin-top:6px;margin-left:6px;background:#ef4444;color:#fff;padding:3px 8px;border-radius:4px;font-size:.55rem;font-weight:700;text-transform:uppercase;animation:pulse 2s ease-in-out infinite">⚠️ No actualizó hoy</span>` : '';

  let html=`<div class="person-card" style="animation-delay:100ms">
    <div class="accent-top" style="background:linear-gradient(90deg,${color},${color}44)"></div>
    <div class="person-header">
      ${photoRing(member.id, displayPct, 90, 6)}
      <div class="info">
        <div class="name">${cfg.name||member.name}</div>
        <div class="role">Ejecutivo Contable</div>
        <span class="unit-tag" style="background:${color}22;color:${color}">CONTABILIDAD</span>
        ${rodyNoUpdBadge}
      </div>
      <div class="big-pct">
        <div class="pct-num" style="color:${status.color}">${displayPct}%</div>
        <span class="status-label" style="background:${status.bg};color:${status.color}">● ${status.label}</span>
      </div>
    </div>
    ${(function(){const r=renderProductividadReloj({compact:true});return r?`<div style="padding:0 28px 4px">${r}</div>`:"";})()}
    <div id="dual-gauge-rody" style="padding:0 28px 4px">${renderDualGauges('rody', true)}</div>
    <div class="divider"></div>`;

  // Weekly tasks
  if(stats.tasks.length>0){
    html+=`<div class="task-section">
      <div class="section-title"><span class="icon">📋</span> Semana ${activeWeek} — ${stats.taskCount} tareas</div>`;
    stats.tasks.forEach(task=>{
      const ts=getStatus(task.pct);
      html+=`<div class="task-row">
        <div class="task-name">${task.name}</div>
        <div class="progress-bar"><div class="progress-fill" style="width:${Math.min(task.pct,100)}%;background:${ts.color}"></div></div>
        <span class="task-pct" style="color:${ts.color}">${task.pct}%</span>
      </div>`;
    });
    html+=`</div><div class="divider"></div>`;
  }

  // Clientes contabilidad - ordenados por urgencia con 5 mini-cards
  const rodyContab = getClientesContabilidad(["rodi","rody"]);
  if(rodyContab.length > 0){
    html+=`<div class="task-section">
      <div class="section-title"><span class="icon">🏢</span> Clientes Contabilidad — por vencimiento <span class="src-tag">Clientes · Vencimiento N</span></div>`;
    html += render5MiniCards(rodyContab);
    const ordenados = sortClientesByUrgencia(rodyContab);
    ordenados.forEach(c=>{
      const est = getClienteEstado(c);
      const vencLabel = c.vencimientoDia ? `Día ${c.vencimientoDia}` : '';
      html+=`<div class="task-row" style="border-left:3px solid ${est.color};padding-left:8px">
        <div class="task-name">${est.emoji} ${c.razonSocial} <span style="color:var(--text-dim);font-size:.65rem;font-weight:600">· ${vencLabel}</span></div>
        <div class="progress-bar"><div class="progress-fill" style="width:${c.avancePct}%;background:${est.color}"></div></div>
        <span class="task-pct" style="color:${est.color}">${c.avancePct}%</span>
      </div>`;
    });
    html+=`</div><div class="divider"></div>`;
  } else if(rodyClientes.length>0){
    // Fallback: usar la lista vieja sin vencimientos (la del campo "ejecutivo" de hoja Clientes)
    const rodyClientesOrdenados = [...rodyClientes].sort((a,b)=>(b.avancePct||0)-(a.avancePct||0));
    html+=`<div class="task-section">
      <div class="section-title"><span class="icon">🏢</span> Clientes Contabilidad (${rodyClientes.length}) — ${clienteAvg}% avance</div>`;
    rodyClientesOrdenados.forEach(c=>{
      const cs=getStatus(c.avancePct);
      html+=`<div class="task-row">
        <div class="task-name">${c.razonSocial}</div>
        <div class="progress-bar"><div class="progress-fill" style="width:${c.avancePct}%;background:${cs.color}"></div></div>
        <span class="task-pct" style="color:${cs.color}">${c.avancePct}%</span>
      </div>`;
    });
    html+=`</div><div class="divider"></div>`;
  }

  // Detalle hoy — con resolver de nombre
  const rodyValidDetalle = detalleTasks
    .map(t=>({...t, _name: getTaskName(t)}))
    .filter(t=>t._name);
  const rodyValidDone = rodyValidDetalle.filter(t=>t.todayChecked).length;
  if(rodyValidDetalle.length>0){
    html+=`<div class="task-section">
      <div class="section-title"><span class="icon">📌</span> Tareas diarias (${rodyValidDone}/${rodyValidDetalle.length}) <span class="src-tag">Tareas · Detalle Rody</span></div>`;
    rodyValidDetalle.forEach(task=>{
      const ws=getStatus(task.weekPct);
      html+=`<div class="task-row">
        <div class="task-name">${task._name}</div>
        <div class="progress-bar" style="width:70px"><div class="progress-fill" style="width:${task.weekPct}%;background:${ws.color}"></div></div>
        <span class="task-pct" style="color:${ws.color}">${task.weekPct}%</span>
        <span class="task-check" style="background:${task.todayChecked?'#10b981':'#d1cce8'};color:${task.todayChecked?'#fff':'var(--text-dim)'}">
          ${task.todayChecked?'✓':'—'}</span>
      </div>`;
    });
    html+=`</div><div class="divider"></div>`;
  }

  // Tareas varias — solo mostrar si hay al menos 1
  if(tareasV.length > 0){
    html+=`<div class="task-section">
      <div class="section-title"><span class="icon">📝</span> Tareas varias hoy (${tareasV.length})</div>`;
    tareasV.slice(0,4).forEach(tv=>{
      const es=estadoStyle(tv.estado);
      html+=`<div class="tv-row">
        <span class="tv-tag" style="background:${es.bg};color:${es.color}">${tv.estado||'—'}</span>
        <span class="tv-tarea">${tv.tarea}</span>
      </div>`;
    });
    html+=`</div>`;
  }
  html+=`</div>`;
  return html;
}

// RENDER: Vencimientos Card (reemplaza a Lisi)
// ══════════════════════════════════════════════════
function renderVencimientosCard(){
  const vencs = appData.vencimientos||[];
  if(vencs.length===0) return `<div class="person-card" style="animation-delay:300ms">
    <div class="accent-top" style="background:linear-gradient(90deg,#623F98,#623F9844)"></div>
    <div class="task-section"><div class="section-title"><span class="icon">📅</span> Vencimientos del Mes</div>
    <div class="tv-empty">Cargando vencimientos...</div></div></div>`;

  const hoy = new Date().getDate();
  const mesActual = appData.month?.name||'';
  
  // Helper para formatear %
  const fmtPct = (val) => {
    if(!val && val!==0) return '—';
    const num = parseFloat(String(val).replace('%',''))||0;
    const pct = num <= 1 && num > 0 ? Math.round(num*100) : Math.round(num);
    return pct+'%';
  };

  // Helper para extraer pct numérico
  const getPctNum = (val) => {
    const num = parseFloat(String(val).replace('%',''))||0;
    return num <= 1 && num > 0 ? Math.round(num*100) : Math.round(num);
  };

  // Clasificar cada vencimiento en 3 grupos:
  //   completados: día pasó Y avance >= 100%   → fijos arriba en verde (mini-cards)
  //   atrasados:   día pasó pero avance < 100% → fijos en bloque rojo (lista)
  //   activos:     día actual o futuro          → scroll abajo
  const completados = [];
  const atrasados = [];
  const activos = [];
  vencs.forEach(v=>{
    const pct = getPctNum(v.avanceGeneral);
    const isPast = v.dia < hoy;
    if(isPast && pct >= 100) completados.push({...v, _pct:pct});
    else if(isPast && pct < 100) atrasados.push({...v, _pct:pct});
    else activos.push({...v, _pct:pct});
  });

  // Función para renderizar un bloque de vencimiento (lista expandida con clientes)
  const renderVencBlock = (v) => {
    const isToday = v.dia === hoy;
    const isPast = v.dia < hoy;
    const pct = v._pct;
    const status = getStatus(pct);
    let headerBg = '#f5f3f8', headerBorder = '#e0dce8', titleColor = '#623F98', dayIcon = '📆';
    if(isToday){ 
      headerBg='#fef3c7'; headerBorder='#f59e0b'; titleColor='#f59e0b'; dayIcon='⚡';
    } else if(isPast && pct >= 100){
      // Día pasado completo → verde
      headerBg='#ecfdf5'; headerBorder='#a7f3d0'; titleColor='#10b981'; dayIcon='✅';
    } else if(isPast && pct < 100){
      // Día pasado incompleto → rojo
      headerBg='#fef2f2'; headerBorder='#fecaca'; titleColor='#ef4444'; dayIcon='⚠️';
    }
    
    let h=`<div style="background:${headerBg};border:1px solid ${headerBorder};border-radius:10px;padding:12px;margin-bottom:10px;${isToday?'box-shadow:0 0 12px rgba(245,158,11,0.2)':''}">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:1.1rem;font-weight:800;color:${titleColor};font-family:'Space Mono',monospace">${dayIcon} Día ${v.dia}</span>
          ${isToday?'<span style="font-size:.5rem;font-weight:700;background:#f59e0b;color:#fff;padding:2px 8px;border-radius:4px;text-transform:uppercase">HOY</span>':''}
        </div>
        <span style="font-family:'Space Mono',monospace;font-size:1rem;font-weight:800;color:${titleColor}">${fmtPct(v.avanceGeneral)}</span>
      </div>`;
    if(v.clientes && v.clientes.length>0){
      v.clientes.forEach(c=>{
        const cPct = getPctNum(c.avanceFecha);
        const cs = getStatus(cPct);
        h+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-top:1px solid ${headerBorder}">
          <span style="font-size:.7rem;font-weight:600">${c.nombre}</span>
          <span style="font-size:.7rem;font-weight:700;color:${cs.color};font-family:'Space Mono',monospace">${fmtPct(c.avanceFecha)}</span>
        </div>`;
      });
    }
    h+=`</div>`;
    return h;
  };

  // Header con contadores
  let html=`<div class="person-card" style="animation-delay:300ms">
    <div class="accent-top" style="background:linear-gradient(90deg,#10b981,#623F98,#f59e0b)"></div>
    <div style="padding:20px 28px 12px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div style="font-size:1.2rem;font-weight:800">📅 Vencimientos — ${mesActual} <span class="src-tag">Clientes · Vencimiento N</span></div>
          <div style="font-size:.65rem;color:var(--text-dim);margin-top:4px">Obligaciones tributarias por fecha</div>
        </div>
        <div style="display:flex;gap:10px;font-size:.6rem;font-weight:700;text-align:center">
          <div style="background:#10b98115;border:1px solid #10b98144;border-radius:8px;padding:6px 10px">
            <div style="font-family:'Space Mono',monospace;font-size:1.1rem;color:#10b981">${completados.length}</div>
            <div style="color:#10b981;text-transform:uppercase;font-size:.5rem">✅ Cerrados</div>
          </div>
          <div style="background:#ef444415;border:1px solid #ef444444;border-radius:8px;padding:6px 10px">
            <div style="font-family:'Space Mono',monospace;font-size:1.1rem;color:#ef4444">${atrasados.length}</div>
            <div style="color:#ef4444;text-transform:uppercase;font-size:.5rem">⚠️ Atrasados</div>
          </div>
          <div style="background:#623F9815;border:1px solid #623F9844;border-radius:8px;padding:6px 10px">
            <div style="font-family:'Space Mono',monospace;font-size:1.1rem;color:#623F98">${activos.length}</div>
            <div style="color:#623F98;text-transform:uppercase;font-size:.5rem">📅 Por venir</div>
          </div>
        </div>
      </div>
    </div>
    <div class="divider"></div>`;

  // ── BLOQUE 1: COMPLETADOS (lista expandida fija arriba, en verde) ──
  if(completados.length > 0){
    html+=`<div style="padding:14px 28px 6px">
      <div style="font-size:.65rem;color:#10b981;font-weight:800;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">
        ✅ Días cerrados (${completados.length})
      </div>
      ${completados.map(renderVencBlock).join('')}
    </div>`;
  }

  // ── BLOQUE 2: ATRASADOS (lista expandida fija, en rojo) ──
  if(atrasados.length > 0){
    html+=`<div style="padding:14px 28px 6px;${completados.length>0?'border-top:1px dashed #e0dce8':''}">
      <div style="font-size:.65rem;color:#ef4444;font-weight:800;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">
        ⚠️ Días pasados sin cerrar (${atrasados.length})
      </div>
      ${atrasados.map(renderVencBlock).join('')}
    </div>`;
  }

  // ── SEPARADOR "HOY" ──
  if(activos.length > 0 && (completados.length > 0 || atrasados.length > 0)){
    html+=`<div style="padding:14px 28px 6px">
      <div style="display:flex;align-items:center;gap:10px">
        <div style="flex:1;height:2px;background:linear-gradient(90deg,transparent,#f59e0b)"></div>
        <div style="background:#1a1a2e;color:#fff;font-size:.6rem;font-weight:800;padding:4px 12px;border-radius:12px;font-family:'Space Mono',monospace;white-space:nowrap">
          ⚡ HOY · DÍA ${hoy}
        </div>
        <div style="flex:1;height:2px;background:linear-gradient(90deg,#f59e0b,transparent)"></div>
      </div>
    </div>`;
  }

  // ── BLOQUE 3: ACTIVOS (en curso + futuros, con scroll) ──
  if(activos.length > 0){
    html+=`<div class="task-section venc-scroll-container" style="max-height:380px;overflow:hidden;position:relative;padding-top:4px">`;
    activos.forEach(v=>{ html+=renderVencBlock(v); });
    html+=`</div>`;
  }

  // Caso límite: todo cerrado, nada por venir
  if(completados.length===0 && atrasados.length===0 && activos.length===0){
    html+=`<div class="task-section"><div class="tv-empty">Sin vencimientos cargados</div></div>`;
  }

  html+=`</div>`;
  return html;
}

function render(){
  if(!appData)return;
  // Cachear scores reales para que todas las cards usen los mismos números
  window._realScores = computeRealScores();
  const team=appData.team.filter(m=>!m.error);
  const month=appData.month;
  const ledy=appData.ledy;
  const now=new Date();

  // Collect all weeks
  const allWeeks=[];
  team.forEach(m=>m.weeks?.forEach(w=>{if(!allWeeks.includes(w.weekNumber))allWeeks.push(w.weekNumber)}));

  // ── RANKING COMPETITIVO MENSUAL ──
  const mesActual = month?.name||new Date().toLocaleString('es-PY',{month:'long'});
  const competitors = [];

  // Helper: días laborales del mes a partir del PRIMER LUNES del mes
  // (no del día 1, porque la planilla agrupa por semana de lunes)
  const calcDiasLaborales = () => {
    const now = new Date();
    const year = now.getFullYear();
    const monthIdx = now.getMonth();
    const today = now.getDate();
    let transcurridos = 0;
    let totales = 0;
    const lastDay = new Date(year, monthIdx+1, 0).getDate();
    // L-S (1..6), incluye todo el mes desde día 1. Domingos NO cuentan.
    for(let d=1; d<=lastDay; d++){
      const dow = new Date(year, monthIdx, d).getDay();
      if(dow>=1 && dow<=6){
        totales++;
        if(d<=today) transcurridos++;
      }
    }
    return { transcurridos, totales };
  };
  const { transcurridos: diasTranscurridos, totales: diasTotalesMes } = calcDiasLaborales();

  // Helper: estado de un cliente según su vencimiento y avance
  const getClienteEstado = (cliente) => {
    const today = new Date().getDate();
    const venc = cliente.vencimientoDia;
    const pct = cliente.avancePct || 0;
    if(pct >= 100) return { key:'completado', label:'Completado', color:'#10b981', emoji:'✅' };
    if(venc < today) return { key:'atrasado', label:'Atrasado', color:'#ef4444', emoji:'🔴' };
    const diasParaVenc = venc - today;
    if(diasParaVenc <= 3 && pct < 70) return { key:'enriesgo', label:'En riesgo', color:'#f59e0b', emoji:'🟡' };
    if(diasParaVenc <= 3 && pct >= 70) return { key:'aldia', label:'Al día', color:'#06b6d4', emoji:'🟢' };
    return { key:'futuro', label:'Pendiente', color:'#94a3b8', emoji:'⚪' };
  };

  // Helper: agrupar clientes contabilidad por estado para una persona
  const calcClientesStats = (ejecutivoMatch) => {
    const cl = (appData.clientesContabilidad||[]).filter(c=>{
      const e = (c.ejecutivo||"").toLowerCase();
      return ejecutivoMatch.some(m => e.includes(m));
    });
    const stats = {completado:0, aldia:0, enriesgo:0, atrasado:0, futuro:0};
    cl.forEach(c => {
      const est = getClienteEstado(c);
      stats[est.key]++;
    });
    // OPCIÓN A: solo cuenta lo que ya tiene urgencia (no los futuros)
    // okPct = (completados + al_día) / (completados + al_día + en_riesgo + atrasados)
    // Si no hay nada urgente aún, okPct = 100 (no se penaliza estar adelantado)
    const total = cl.length;
    const urgentes = stats.completado + stats.aldia + stats.enriesgo + stats.atrasado;
    const ok = stats.completado + stats.aldia;
    const okPct = urgentes > 0 ? Math.round((ok / urgentes) * 100) : 100;
    return { ...stats, total, okPct, clientes: cl };
  };

  // Helper: métricas desde el detalle de tareas diarias
  const calcFromDetalle = (name) => {
    const dt = getDetalleForMember(name).map(t=>({...t,_name:getTaskName(t)})).filter(t=>t._name);
    const weekAvg = dt.length>0 ? Math.round(dt.reduce((s,t)=>s+(t.weekPct||0),0)/dt.length) : 0;
    const todayDone = dt.filter(t=>t.todayChecked).length;
    const dailyPct = dt.length>0 ? Math.round((todayDone/dt.length)*100) : 0;
    return { tasks: dt, weekAvg, todayDone, dailyPct };
  };

  // Helper: SCORE UNIFICADO
  // Si la persona tiene clientes contabilidad: 30% tareas diarias + 70% clientes
  // Si NO tiene clientes (Randy): 100% tareas diarias
  const calcScore = (tareasPct, clientesStats) => {
    if(clientesStats.total === 0) return tareasPct; // Randy
    return Math.round(tareasPct * 0.3 + clientesStats.okPct * 0.7);
  };

  // Helper: las 3 métricas Día/Semana/Mes
  // - Día = % de tareas tildadas hoy
  // - Semana = % promedio de tareas de la semana actual
  // - Mes = avance proporcional al tiempo transcurrido del mes
  //   Si la persona va al 100% de lo que iba hasta hoy, su Mes = % del mes que transcurrió
  //   Si va al 50%, su Mes = 50% × (% del mes transcurrido)
  const calc3Pcts = (dailyPct, weeklyPct) => {
    const pctMesTranscurrido = diasTotalesMes > 0 ? (diasTranscurridos / diasTotalesMes) : 0;
    const monthPct = Math.round(weeklyPct * pctMesTranscurrido);
    return { dailyPct, weeklyPct, monthPct };
  };

  // Randy (sin clientes contabilidad)
  const randyM = calcFromDetalle("Randy");
  const randyMemRef = appData.team.find(m=>m.id==="randy");
  const randyAllWeeks = randyMemRef?.weeks||[];
  const randyPcts = calc3Pcts(randyM.dailyPct, randyM.weekAvg);
  const randyClientes = calcClientesStats([]); // sin clientes
  competitors.push({
    id:"randy", name:"Randy Peters", role:"Ejecutivo Administrativo",
    monthPct: randyPcts.monthPct,
    weeklyPct: randyPcts.weeklyPct,
    dailyPct: randyPcts.dailyPct,
    tareasHoy: randyM.todayDone,
    tareasTotal: randyM.tasks.length,
    tareasVarias: getTareasVariasHoy("Randy").length,
    clientesStats: randyClientes,
    score: (window._realScores?.randy) ?? calcScore(randyPcts.monthPct, randyClientes)
  });

  // Rody (con clientes contabilidad)
  const rodyM = calcFromDetalle("Rody");
  const rodyMemRef = appData.team.find(m=>m.id==="rody");
  const rodyAllWeeks = rodyMemRef?.weeks||[];
  const rodyPcts = calc3Pcts(rodyM.dailyPct, rodyM.weekAvg);
  const rodyClientes = calcClientesStats(["rodi","rody"]);
  competitors.push({
    id:"rody", name:"Rodolfo Peters", role:"Ejecutivo Contable",
    monthPct: rodyPcts.monthPct,
    weeklyPct: rodyPcts.weeklyPct,
    dailyPct: rodyPcts.dailyPct,
    tareasHoy: rodyM.todayDone,
    tareasTotal: rodyM.tasks.length,
    tareasVarias: getTareasVariasHoy("Rody").length,
    clientesStats: rodyClientes,
    score: (window._realScores?.rody) ?? calcScore(rodyPcts.monthPct, rodyClientes)
  });

  // Magalí: 30% tareas pendientes (planilla nueva) + 70% clientes contabilidad
  const magaClientes = calcClientesStats(["magal"]);
  const magaTP = appData.tareasPendMaga;
  // Para Maga, el "weekly" lo calculamos como % de tareas realizadas (no es semanal puro pero es lo que tenemos)
  const magaTareasPct = (magaTP && magaTP.total > 0)
    ? Math.round((magaTP.realizadas / magaTP.total) * 100)
    : 0;
  const magaPcts = calc3Pcts(magaTareasPct, magaTareasPct);
  const magaScoreReal = (window._realScores?.maga) ?? (
    magaClientes.total > 0
      ? Math.round(magaPcts.monthPct * 0.3 + magaClientes.okPct * 0.7)
      : magaPcts.monthPct
  );
  competitors.push({
    id:"maga", name:"Magalí Merlo", role:"Contadora Junior",
    monthPct: magaPcts.monthPct,
    weeklyPct: magaPcts.weeklyPct,
    dailyPct: magaPcts.dailyPct,
    tareasHoy: magaTP ? magaTP.realizadas : 0,
    tareasTotal: magaTP ? magaTP.total : 0,
    tareasVarias: 0,
    clientesStats: magaClientes,
    score: magaScoreReal
  });

  competitors.forEach(c => { c.monthlyPct = c.monthPct; });
  competitors.sort((a,b)=>b.score-a.score);
  
  const medals = ['🥇','🥈','🥉'];
  const podiumColors = ['#f59e0b','#94a3b8','#cd7f32'];
  
  html+=`<div class="person-card" style="animation-delay:0ms;margin-bottom:24px">
    <div class="accent-top" style="background:linear-gradient(90deg,#f59e0b,#ef4444,#623F98)"></div>
    <div style="padding:24px 28px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div class="section-title" style="margin:0"><span class="icon">🏆</span> RANKING COMPETITIVO — ${mesActual} ${month?.year||2026} <span class="src-tag">Calculado · Múltiples fuentes</span></div>
        <div style="font-size:.65rem;color:var(--text-dim)">Del 1 al ${new Date(new Date().getFullYear(),new Date().getMonth()+1,0).getDate()} · Acumulado mensual</div>
      </div>
      <div style="font-size:.65rem;color:var(--text-dim);margin-bottom:6px;font-style:italic">👑 Ledy y Verónica son Directoras — fuera de competencia</div>
      ${(function(){
        // Promedio del equipo competitivo (Randy, Rody, Maga) en su métrica MES
        const teamAvg = competitors.length > 0
          ? Math.round(competitors.reduce((s,c)=>s+(c.monthlyPct||0),0) / competitors.length)
          : 0;
        return renderMonthProgressBar(teamAvg, { label:"📆 Avance del Equipo Competitivo (Randy + Rody + Maga)" });
      })()}
      ${(function(){
        // Plan de recuperación INDIVIDUAL para cada competidor cuyo SCORE esté bajo
        const cards = competitors.map(c => {
          const plan = getRecoveryPlan(c.id, c.score);
          if(!plan) return null;
          return { c, plan };
        }).filter(x => x);
        if(cards.length === 0) return '';
        return `<div style="display:grid;grid-template-columns:repeat(${cards.length},minmax(280px,1fr));gap:14px;margin-top:14px">
          ${cards.map(({c,plan}) => `
            <div style="background:#fff;border-radius:12px;border:1px solid #e0dce8;padding:12px 14px">
              <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
                ${MEMBER_PHOTOS[c.id]?`<img src="${MEMBER_PHOTOS[c.id]}" style="width:32px;height:32px;border-radius:50%;object-fit:cover">`:''}
                <div style="flex:1;min-width:0">

                  <div style="font-size:.55rem;color:var(--text-dim);font-weight:700">Score ${c.score}% · Meta 80%</div>
                </div>
              </div>
              ${renderRecoveryBox(plan, { compact:true })}
            </div>
          `).join('')}
        </div>`;
      })()}
      <div style="display:flex;gap:20px;align-items:flex-end;justify-content:center">`;
  
  const podiumOrder = competitors.length>=3 ? [competitors[1],competitors[0],competitors[2]] : competitors;
  const podiumHeights = competitors.length>=3 ? [140,180,120] : [180,140];
  
  podiumOrder.forEach((c,i)=>{
    const rank = competitors.indexOf(c);
    const height = competitors.length>=3 ? podiumHeights[i] : podiumHeights[i]||110;
    const isFirst = rank===0;
    const scoreStatus = getStatus(c.score);
    const prod = computeProductividadPersona(c.id);
    const horasPct = prod.pctHoras;
    const horasColor = horasPct >= 80 ? '#10b981' : horasPct >= 50 ? '#f59e0b' : horasPct === 0 ? (isFirst?'rgba(255,255,255,0.3)':'#d1cce8') : '#ef4444';
    const horasStr = prod.horasEstimadas >= 1 ? prod.horasEstimadas.toFixed(1)+'h' : prod.tareasHechas > 0 ? Math.round(prod.horasEstimadas*60)+'min' : '—';
    const sz = isFirst ? 64 : 54; const sk = 6;
    const rg = (sz-sk)/2; const cg = 2*Math.PI*rg;
    const og = cg - (horasPct/100)*cg;
    const noActualizo = !window._dailyDataBroken && c.dailyPct===0 && c.weeklyPct===0;

    html+=`<div style="display:flex;flex-direction:column;align-items:center;flex:1;max-width:260px">
      <!-- Medalla -->
      <div style="font-size:${isFirst?'2rem':'1.4rem'};margin-bottom:4px">${medals[rank]||''}</div>
      <!-- Foto + ring de score -->
      <div style="margin-bottom:6px">${photoRing(c.id, c.score, isFirst?85:70, 5)}</div>
      <!-- Nombre y rol -->
      <div style="font-size:${isFirst?'.95rem':'.78rem'};font-weight:800;text-align:center;line-height:1.2">${c.name}</div>
      <div style="font-size:.58rem;color:var(--text-dim);margin-bottom:8px">${c.role}</div>
      <!-- Bloque podio (score + pendientes) -->
      <div style="background:${isFirst?'linear-gradient(135deg,#f59e0b,#f97316)':podiumColors[rank]+'33'};border-radius:14px 14px 0 0;width:100%;height:${height}px;margin-top:2px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px 10px;gap:4px;${isFirst?'box-shadow:0 0 25px rgba(245,158,11,0.35)':''}">
        <div style="font-family:'Space Mono',monospace;font-size:${isFirst?'2.6rem':'1.9rem'};font-weight:800;line-height:1;color:${isFirst?'#fff':scoreStatus.color}">${c.score}%</div>
        <div style="font-size:.55rem;font-weight:700;color:${isFirst?'rgba(255,255,255,0.8)':'var(--text-dim)'};text-transform:uppercase;letter-spacing:.5px">Score Real</div>
        ${renderPendientesBadge(c.id, isFirst)}
        ${noActualizo?`<div style="margin-top:4px;background:#ef4444;color:#fff;padding:2px 7px;border-radius:4px;font-size:.48rem;font-weight:700;text-transform:uppercase">⚠️ Sin actualizar hoy</div>`:''}
      </div>
      <!-- Gauge productividad — FUERA del bloque de color, propio espacio -->
      <div id="podio-gauge-${c.id}" style="width:100%;background:${isFirst?'#fff8ed':'#f9f7fc'};border:1px solid ${isFirst?'#f59e0b44':'#e0dce8'};border-top:none;border-radius:0 0 12px 12px;padding:10px 12px;display:flex;align-items:center;gap:10px">
        <!-- Mini gauge SVG -->
        <div style="position:relative;width:${sz}px;height:${sz}px;flex-shrink:0">
          <svg width="${sz}" height="${sz}" style="transform:rotate(-90deg)">
            <circle cx="${sz/2}" cy="${sz/2}" r="${rg}" fill="none" stroke="${isFirst?'rgba(245,158,11,0.15)':'#e8e3f0'}" stroke-width="${sk}"/>
            <circle cx="${sz/2}" cy="${sz/2}" r="${rg}" fill="none" stroke="${horasColor}" stroke-width="${sk}"
              stroke-dasharray="${cg}" stroke-dashoffset="${og}" stroke-linecap="round"
              style="transition:stroke-dashoffset 1.2s ease;filter:drop-shadow(0 0 4px ${horasColor}66)"/>
          </svg>
          <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;line-height:1">
            <div style="font-size:${isFirst?'.55rem':'.48rem'};font-weight:900;font-family:'Space Mono',monospace;color:${horasColor}">${horasPct}%</div>
          </div>
        </div>
        <!-- Info productividad -->
        <div style="flex:1;min-width:0">
          <div style="font-size:.5rem;font-weight:800;color:var(--text-dim);text-transform:uppercase;letter-spacing:.4px">⏱ Productividad</div>
          <div style="font-family:'Space Mono',monospace;font-size:${isFirst?'.8rem':'.7rem'};font-weight:800;color:${horasColor};margin-top:1px">${horasStr} / ${prod.horasTotales}h</div>
          <div style="font-size:.48rem;color:var(--text-dim);margin-top:2px">${prod.tareasHechas} tareas · ${prod.minsPorTarea}min/c</div>
        </div>
      </div>
    </div>`;
  });
  
  html+=`</div>
    </div>
  </div>`;

  // ── Row 4: Equipo operativo (Rody | Maga | Randy) ──
  const randy=team.find(m=>m.id==="randy");
  const rody=team.find(m=>m.id==="rody");
  html+=`<div class="team-grid cols-3">`;
  if(rody)html+=renderRodyCard(rody);
  html+=renderMagaCard();
  if(randy)html+=renderPersonCard(randy, 200);
  html+=`</div>`;

  // ── SECCIÓN FINAL: PENDIENTES CONSOLIDADO (3 columnas) ──
  html += renderPendientesConsolidado();

  html+=`<div class="footer">VG EAS · Tablero en Vivo · Se actualiza automáticamente cada 5 minutos</div>`;
  document.getElementById("app").innerHTML=html;

  // Auto-scroll para Vencimientos (TV sin touch)
  setTimeout(()=>{
    const vc = document.querySelector('.venc-scroll-container');
    if(vc && vc.scrollHeight > vc.clientHeight){
      let scrollDir = 1;
      const scrollSpeed = 1;
      const pauseAtEnd = 3000;
      let paused = false;
      if(window._vencInterval) clearInterval(window._vencInterval);
      window._vencInterval = setInterval(()=>{
        if(paused) return;
        vc.scrollTop += scrollDir * scrollSpeed;
        if(vc.scrollTop + vc.clientHeight >= vc.scrollHeight){
          paused = true;
          setTimeout(()=>{ scrollDir = -1; paused = false; }, pauseAtEnd);
        }
        if(vc.scrollTop <= 0 && scrollDir === -1){
          paused = true;
          setTimeout(()=>{ scrollDir = 1; paused = false; }, pauseAtEnd);
        }
      }, 30);
    }
  }, 500);
}
