<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VG EAS — Tablero en Vivo</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #2d1a4e;
    --bg-card: rgba(255,255,255,0.97);
    --bg-inner: #f0f0f5;
    --border: #e0dce8;
    --border-light: #d1cce0;
    --text-bright: #1a1a2e;
    --text-mid: #555566;
    --text-dim: #888899;
    --green: #10b981;
    --yellow: #f59e0b;
    --red: #ef4444;
    --indigo: #623F98;
    --purple: #623F98;
    --gold: #F5C518;
    --amber: #f59e0b;
    --cyan: #06b6d4;
  }

  /* ── VG Asociados decorative crosses (watermark) ── */
  body::before, body::after {
    content: '+'; position:fixed; font-weight:900; pointer-events:none; z-index:0; color:#e8782a;
  }
  body::before { top:30px; right:80px; font-size:8rem; opacity:.08; }
  body::after { bottom:60px; left:60px; font-size:6rem; opacity:.06; }
  .cross-deco { position:fixed; font-weight:900; pointer-events:none; z-index:0; color:#e8782a; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { font-size: 18px; } /* base grande para TV */

  /* ── RESPONSIVE — Mobile & Tablet ── */
  @media (max-width: 1200px) {
    html { font-size: 15px; }
    body { padding: 20px 24px; }
    .summary-grid { grid-template-columns: repeat(3,1fr); }
    .team-grid.cols-3 { grid-template-columns: repeat(2,1fr); }
  }

  @media (max-width: 768px) {
    html { font-size: 13px; }
    body { padding: 14px 16px; overflow-x: hidden; }
    .header { flex-wrap: wrap; gap: 10px; }
    .header-right { flex-wrap: wrap; gap: 8px; }
    .summary-grid { grid-template-columns: repeat(2,1fr) !important; gap: 10px; }
    /* Forzar 1 columna en todas las grids de equipo */
    .team-grid,
    .team-grid.cols-3,
    .team-grid.cols-2,
    .team-grid.cols-1 { grid-template-columns: 1fr !important; }
    .person-card { border-radius: 14px; }
    .task-section { border-right: none !important; border-bottom: 1px solid #e0dce8; padding-bottom: 16px; margin-bottom: 16px; }
    /* Colapsar grids internos de cards */
    .person-card div[style*="display:grid"] { grid-template-columns: 1fr !important; }
    .person-card div[style*="display:flex"] { flex-wrap: wrap !important; }
    /* Gauge + tareas: apilar verticalmente */
    .person-card .task-section { min-width: 0 !important; width: 100% !important; }
    /* Dual gauge: ancho completo */
    div[id^="dual-gauge-"] { padding: 0 16px 4px !important; }
    .gauge-tasks-row { flex-direction: column !important; align-items: flex-start !important; }
    .gauge-tasks-row > div { width: 100% !important; }
    /* PODIO: forzar columna vertical */
    #podio-section { overflow-x: hidden !important; }
    #podio-section > div { flex-direction: column !important; align-items: center !important; width: 100% !important; max-width: 100% !important; }
    .podio-wrap,
    div[style*="display:flex"][style*="align-items:flex-end"],
    div[style*="display:flex"][style*="justify-content:center"] { 
      flex-direction: column !important; 
      align-items: center !important; 
      gap: 16px !important; 
      width: 100% !important;
    }
    /* Forzar ancho completo en columnas de podio */
    div[style*="flex-direction:column"][style*="align-items:center"] { 
      max-width: 100% !important; 
      width: 100% !important; 
    }
    /* Summary grid Hermann: 2 cols max */
    div[style*="grid-template-columns:1fr 1fr 1fr"] { grid-template-columns: 1fr 1fr !important; }
    div[style*="grid-template-columns:repeat(3"] { grid-template-columns: 1fr 1fr !important; }
    div[style*="grid-template-columns:repeat(6"] { grid-template-columns: repeat(3,1fr) !important; }
    /* Overflow en toda la app */
    #app, #app > * { max-width: 100vw !important; overflow-x: hidden !important; }
    /* Barras de semana */
    .week-bar { max-width: 22px !important; }
  }

  @media (max-width: 480px) {
    html { font-size: 12px; }
    body { padding: 10px 12px; }
    .summary-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
    .logo { width: 40px !important; height: 40px !important; }
    /* Cobros: montos en columna */
    .cobros-montos { flex-direction: column !important; }
  }
  body {
    font-family:'DM Sans',sans-serif;
    background: #2d1a4e;
    background-image:
      /* Scattered cross pattern as watermark */
      radial-gradient(circle at 15% 25%, rgba(232,120,42,0.06) 0%, transparent 50%),
      radial-gradient(circle at 85% 75%, rgba(232,120,42,0.06) 0%, transparent 50%),
      radial-gradient(circle at 50% 50%, rgba(232,120,42,0.03) 0%, transparent 70%),
      repeating-linear-gradient(135deg, transparent, transparent 60px, rgba(232,120,42,0.04) 60px, rgba(232,120,42,0.04) 62px),
      repeating-linear-gradient(45deg, transparent, transparent 60px, rgba(232,120,42,0.04) 60px, rgba(232,120,42,0.04) 62px);
    min-height:100vh; color:#1a1a2e;
    padding: clamp(10px, 3vw, 40px) clamp(12px, 4vw, 40px);
    overflow-x:hidden;
    position:relative;
  }
  @keyframes spin { to { transform:rotate(360deg); } }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.3} }
  @keyframes fadeUp { from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)} }
  @keyframes glow { 0%,100%{box-shadow:0 0 20px rgba(99,102,241,.15)}50%{box-shadow:0 0 40px rgba(99,102,241,.3)} }

  /* ── HEADER ── */
  .header { display:flex; align-items:center; justify-content:space-between; margin-bottom:28px; }
  .title { font-family:'Space Mono',monospace; font-size:2rem; font-weight:700; letter-spacing:-1px;
    background:linear-gradient(90deg,#623F98,#F5C518);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .subtitle { margin-top:6px; color:rgba(255,255,255,0.7); font-size:.85rem; }
  .subtitle .time { margin-left:16px; color:rgba(255,255,255,0.5); }
  .badges { display:flex; align-items:center; gap:12px; }
  .badge { display:flex; align-items:center; gap:8px; padding:8px 18px; border-radius:24px; font-size:.75rem; font-weight:700; }
  .badge-live { background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.25); color:rgba(255,255,255,0.9); }
  .badge-live .dot { width:10px; height:10px; border-radius:50%; background:var(--green); animation:pulse 2s ease-in-out infinite; }

  /* ── WEEK SELECTOR ── */
  .week-selector { display:flex; gap:8px; margin-bottom:24px; }
  .week-btn { padding:10px 22px; border-radius:10px; border:2px solid rgba(255,255,255,0.2); background:rgba(255,255,255,0.1);
    color:rgba(255,255,255,0.8); font-size:.8rem; font-weight:700; cursor:pointer; font-family:'DM Sans'; transition:all .2s; }
  .week-btn.active { border-color:#e8782a; background:#e8782a; color:#fff; box-shadow:0 4px 16px rgba(232,120,42,.35); }

  /* ── SUMMARY GRID ── */
  .summary-grid { display:grid; grid-template-columns:repeat(6,1fr); gap:16px; margin-bottom:32px; }
  .summary-card { background:#ffffff; border-radius:16px; padding:20px 22px; border:1px solid #e0dce8;
    box-shadow:0 2px 12px rgba(98,63,152,.06); }
  .summary-card .label { font-size:.65rem; color:var(--text-dim); font-weight:700; text-transform:uppercase; letter-spacing:1px; }
  .summary-card .value { font-size:2.2rem; font-weight:800; margin-top:6px; font-family:'Space Mono',monospace; }
  .summary-card .sub { font-size:.65rem; color:var(--text-mid); margin-top:4px; }

  /* ── PERSON CARDS: GRID ── */
  .team-grid { display:grid; gap:24px; margin-bottom:32px; }
  .team-grid.cols-3 { grid-template-columns:repeat(3,1fr); }
  .team-grid.cols-2 { grid-template-columns:repeat(2,1fr); }
  .team-grid.cols-1 { grid-template-columns:1fr; }

  .person-card { background:#ffffff; border-radius:20px; overflow:hidden; max-width:100%;
    border:1px solid #e0dce8; box-shadow:0 4px 24px rgba(98,63,152,.08), 0 1px 3px rgba(0,0,0,.06);
    animation:fadeUp .6s ease both; position:relative; }
  .person-card .accent-top { position:absolute; top:0; left:0; right:0; height:4px; }

  /* ── PERSON HEADER (big photo + ring) ── */
  .person-header { padding:28px 28px 20px; display:flex; align-items:center; gap:22px; }
  .photo-ring-big { position:relative; flex-shrink:0; }
  .photo-ring-big img { border-radius:50%; object-fit:cover; display:block; }
  .photo-ring-big .initials { border-radius:50%; display:flex; align-items:center; justify-content:center;
    font-weight:800; }
  .photo-ring-big svg { position:absolute; top:0; left:0; }
  .person-header .info { flex:1; }
  .person-header .info .name { font-size:1.4rem; font-weight:800; }
  .person-header .info .role { font-size:.75rem; color:var(--text-mid); margin-top:3px; }
  .person-header .info .unit-tag { display:inline-block; margin-top:8px; font-size:.6rem; font-weight:700;
    padding:4px 12px; border-radius:6px; text-transform:uppercase; letter-spacing:.5px; }
  .person-header .big-pct { text-align:center; flex-shrink:0; }
  .person-header .big-pct .pct-num { font-family:'Space Mono',monospace; font-size:2.8rem; font-weight:800; }
  .person-header .big-pct .status-label { font-size:.65rem; font-weight:700; padding:4px 14px;
    border-radius:8px; display:inline-block; margin-top:6px; }

  .divider { height:1px; background:linear-gradient(90deg,transparent,#d1cce8,transparent); margin:0 28px; }

  /* ── TASK SECTION ── */
  .task-section { padding:20px 28px; }
  .section-title { font-size:.65rem; font-weight:700; color:var(--text-dim); text-transform:uppercase;
    letter-spacing:1.2px; margin-bottom:14px; display:flex; align-items:center; gap:8px; }
  .section-title .icon { font-size:1rem; }

  .task-row { display:flex; align-items:center; padding:10px 0; border-bottom:1px solid #f0eef5; }
  .task-row:last-child { border-bottom:none; }
  .task-name { font-size:.8rem; font-weight:600; color:var(--text-bright); flex:1; margin-right:16px; }
  .progress-bar { width:100px; height:10px; border-radius:6px; background:#EDEDED; overflow:hidden; flex-shrink:0; }
  .progress-fill { height:100%; border-radius:6px; transition:width .6s cubic-bezier(.4,0,.2,1); }
  .task-pct { font-size:.85rem; font-weight:800; min-width:50px; text-align:right;
    font-family:'Space Mono',monospace; margin-left:12px; }
  .task-check { width:26px; height:26px; border-radius:7px; text-align:center; line-height:26px;
    font-size:.75rem; margin-left:10px; flex-shrink:0; font-weight:700; }

  /* ── TAREAS VARIAS ── */
  .tv-row { display:flex; align-items:center; gap:12px; padding:8px 0; border-bottom:1px solid #f0eef5; }
  .tv-row:last-child { border-bottom:none; }
  .tv-tag { font-size:.55rem; font-weight:800; padding:4px 10px; border-radius:5px; text-transform:uppercase;
    flex-shrink:0; letter-spacing:.5px; }
  .tv-tarea { font-size:.8rem; color:var(--text-bright); flex:1; font-weight:500; }
  .tv-cliente { font-size:.7rem; color:var(--text-dim); flex-shrink:0; }
  .tv-empty { color:var(--text-dim); font-size:.75rem; font-style:italic; padding:14px 0; }

  /* ── WEEK BARS (bigger) ── */
  .week-bars { display:flex; align-items:flex-end; gap:8px; height:70px; margin-top:10px; }
  .week-bar-col { flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; }
  .week-bar-label { font-size:.6rem; font-weight:700; font-family:'Space Mono',monospace; }
  .week-bar { width:100%; max-width:40px; border-radius:6px; transition:height .4s ease; }
  .week-bar-name { font-size:.6rem; color:var(--text-dim); font-weight:600; }

  /* ── SUPERVISION BREAKDOWN (Ledy) ── */
  .supervision-grid { display:flex; gap:16px; margin-top:12px; ; }
  .sup-mini { background:#f5f3f8; border-radius:14px; padding:16px 18px; flex:1; min-width:160px;
    display:flex; align-items:center; gap:14px; border:1px solid #e0dce8; }
  .sup-mini img { width:44px; height:44px; border-radius:50%; object-fit:cover; border:2px solid #d1cce8; }
  .sup-mini .initials-sm { width:44px; height:44px; border-radius:50%; display:flex; align-items:center;
    justify-content:center; font-weight:800; font-size:.85rem; border:2px solid #d1cce8; }
  .sup-mini .sup-info .sup-name { font-size:.75rem; font-weight:700; }
  .sup-mini .sup-info .sup-pct { font-family:'Space Mono',monospace; font-size:1.1rem; font-weight:800; margin-top:2px; }

  /* ── SOURCE TAG (referencia de hoja, inline badge al lado del título) ── */
  .src-tag { display:inline-block; font-size:.42rem; color:#9890aa; background:#f0ecf5; padding:2px 6px; border-radius:3px; font-weight:600; letter-spacing:.2px; vertical-align:middle; margin-left:8px; white-space:nowrap; }

  /* ── FOOTER ── */
  .footer { text-align:center; margin-top:32px; color:rgba(255,255,255,0.4); font-size:.6rem; letter-spacing:1px; text-transform:uppercase; }

  /* ── LOADING ── */
  .loading { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:70vh; }
  .spinner { width:64px; height:64px; border:5px solid #d1cce8; border-top:5px solid #623F98;
    border-radius:50%; animation:spin 1s linear infinite; }
  .loading p { margin-top:24px; color:#555566; font-size:1rem; }
</style>
</head>
<body>
<div id="app">
  <div class="loading">
    <div class="spinner"></div>
    <p>Conectando con Google Sheets...</p>
  </div>
</div>

// minutesPorTarea: cuántos minutos se estiman por tarea completada
// Para cambiar: modificar el número de cada persona o el panel ⚙️ del tablero
const PRODUCTIVITY_CONFIG = {
  minutesPorTarea: {
    randy:    20,  // Randy: tareas administrativas rápidas
    rody:     30,  // Rody: tareas contables, más tiempo por unidad
    maga:     30,  // Maga: similar a Rody
    ledy:     25,  // Ledy: mix supervisión + tareas
    vero:     25,  // Vero: tareas administrativas
    hermann:  20   // Hermann: gestión ejecutiva
  },
  // Horas laborales del día (para el gauge de tiempo)
  horasLaboralesLV: 8,   // Lunes-Viernes: 8hs
  horasLaboralesSab: 4,  // Sábados: 4hs
  // Clasificación de tareas: 'revenue' o 'mantenimiento'
  // Se puede editar desde el panel ⚙️ o directamente aquí
  // Clave: nombre de tarea normalizado (minúsculas, sin tildes)
  // Si no está clasificada, se cuenta como 'mantenimiento' por defecto
  clasificacionTareas: {} // se carga desde localStorage si existe
};

// Cargar clasificaciones guardadas en localStorage
(function loadClasificaciones(){
  try {
    const saved = localStorage.getItem('vg_clasificacion_tareas');
    if(saved) PRODUCTIVITY_CONFIG.clasificacionTareas = JSON.parse(saved);
  } catch(e) {}
})();

function saveClasificaciones(){
  try {
    localStorage.setItem('vg_clasificacion_tareas', JSON.stringify(PRODUCTIVITY_CONFIG.clasificacionTareas));
  } catch(e) {}
}

function normalizeTareaKey(str){
  if(!str) return '';
  return str.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/[^a-z0-9 ]/g,'').trim();
}

function getTareaClasificacion(nombreTarea){
  const key = normalizeTareaKey(nombreTarea);
  return PRODUCTIVITY_CONFIG.clasificacionTareas[key] || 'mantenimiento';
}

// ══════════════════════════════════════════════════
// HELPER: CALCULAR HORAS Y % REVENUE POR PERSONA
// ══════════════════════════════════════════════════
function computeProductividadPersona(personaId){
  if(!appData) return { horasEstimadas:0, horasTotales:8, tareasHechas:0, tareasTotal:0, pctHoras:0 };

  const nowAsuncion = new Date(new Date().toLocaleString('en-US', { timeZone: 'America/Asuncion' }));
  const dow = nowAsuncion.getDay();
  const isSab = dow === 6;
  const horasTotales = isSab ? PRODUCTIVITY_CONFIG.horasLaboralesSab : PRODUCTIVITY_CONFIG.horasLaboralesLV;
  const minsPorTarea = PRODUCTIVITY_CONFIG.minutesPorTarea[personaId] || 20;

  // ── Detectar si el backend tiene todayChecked funcionando ──
  // Si todos los todayChecked vienen en false, usamos weekPct como proxy
  const allDet = (appData.detalle?.tasks||[]);
  const backendOk = !window._dailyDataBroken && allDet.some(t=>t.todayChecked===true);

  let tareasHechas = 0;  // tareas completadas (hoy o semana según disponibilidad)
  let tareasTotal  = 0;  // total de tareas del período
  let usandoSemana = false; // flag para saber si usamos semana

  if(personaId === 'randy'){
    const det = getDetalleForMember("Randy").map(t=>({...t,_name:getTaskName(t)})).filter(t=>t._name);
    tareasTotal = det.length;
    if(backendOk){
      tareasHechas = det.filter(t=>t.todayChecked).length;
    } else {
      // Fallback: tareas con weekPct >= 80 se consideran "hechas"
      tareasHechas = det.filter(t=>(t.weekPct||0)>=60).length;
      usandoSemana = true;
    }
    // Sumar tareas pendientes realizadas (siempre disponibles)
    const rtp = appData.randyTareasPend;
    if(rtp && rtp.tareas){
      const realizadas = rtp.tareas.filter(t=>t.realizada).length;
      const pendTotal  = rtp.tareas.length;
      tareasHechas += realizadas;
      tareasTotal  += pendTotal;
    }

  } else if(personaId === 'rody'){
    const det = getDetalleForMember("Rody").map(t=>({...t,_name:getTaskName(t)})).filter(t=>t._name);
    tareasTotal = det.length;
    if(backendOk){
      tareasHechas = det.filter(t=>t.todayChecked).length;
    } else {
      tareasHechas = det.filter(t=>(t.weekPct||0)>=60).length;
      usandoSemana = true;
    }

  } else if(personaId === 'maga'){
    // Maga usa tareas pendientes realizadas (siempre disponible, no depende de todayChecked)
    const tp = appData.tareasPendMaga;
    if(tp){
      tareasHechas = tp.realizadas || 0;
      tareasTotal  = tp.total || 0;
    }

  } else if(personaId === 'ledy'){
    // Ledy: intentar primero tareasPendLedy (hoja MAGA_LEDY_TAREAS · Ledy)
    const tp = appData.tareasPendLedy;
    const tp2 = appData.rodyTareasPend; // fallback secundario (misma API que antes usaba)
    const tpActivo = (tp && tp.total > 0) ? tp : (tp2 && tp2.total > 0) ? tp2 : null;
    if(tpActivo){
      tareasHechas = tpActivo.realizadas || 0;
      tareasTotal  = tpActivo.total || 0;
    } else {
      // Último fallback: detalle estándar con weekPct
      const det = getDetalleForMember("Ledy").map(t=>({...t,_name:getTaskName(t)})).filter(t=>t._name);
      tareasTotal = det.length;
      if(backendOk){
        tareasHechas = det.filter(t=>t.todayChecked).length;
      } else {
        tareasHechas = det.filter(t=>(t.weekPct||0)>=50).length;
        usandoSemana = true;
      }
    }

  } else if(personaId === 'vero'){
    // Vero supervisa Randy — refleja el rendimiento de Randy
    const det = getDetalleForMember("Randy").map(t=>({...t,_name:getTaskName(t)})).filter(t=>t._name);
    tareasTotal = det.length;
    if(backendOk){
      tareasHechas = det.filter(t=>t.todayChecked).length;
    } else {
      tareasHechas = det.filter(t=>(t.weekPct||0)>=60).length;
      usandoSemana = true;
    }

  } else if(personaId === 'hermann'){
    // Hermann: suma de TODO el equipo
    const allDetalle = allDet.map(t=>({...t,_name:getTaskName(t)})).filter(t=>t._name);
    tareasTotal = allDetalle.length;
    if(backendOk){
      tareasHechas = allDetalle.filter(t=>t.todayChecked).length;
    } else {
      tareasHechas = allDetalle.filter(t=>(t.weekPct||0)>=60).length;
      usandoSemana = true;
    }
  }

  const horasEstimadas = Math.min((tareasHechas * minsPorTarea) / 60, horasTotales);
  const pctHoras = horasTotales > 0 ? Math.min(Math.round((horasEstimadas / horasTotales) * 100), 100) : 0;

  return { horasEstimadas, horasTotales, tareasHechas, tareasTotal, pctHoras, usandoSemana, minsPorTarea };
}

// ══════════════════════════════════════════════════
// RENDER: DOS GAUGES CIRCULARES
// ══════════════════════════════════════════════════
function renderDualGauges(personaId, compact){
  // Siempre visible — sin restricción de horario ni día
  const prod = computeProductividadPersona(personaId);
  const pct = prod.pctHoras;
  const color = pct >= 80 ? '#10b981' : pct >= 50 ? '#f59e0b' : pct === 0 ? '#d1cce8' : '#ef4444';
  const sz = compact ? 72 : 86;
  const stroke = compact ? 7 : 8;
  const r = (sz - stroke) / 2;
  const circ = 2 * Math.PI * r;
  const offset = circ - (pct / 100) * circ;

  const horasStr = prod.horasEstimadas >= 1
    ? `${prod.horasEstimadas.toFixed(1)}h / ${prod.horasTotales}h`
    : prod.tareasHechas > 0
      ? `${Math.round(prod.horasEstimadas * 60)}min`
      : `0 / ${prod.horasTotales}h`;

  const barPct = prod.tareasTotal > 0 ? Math.round((prod.tareasHechas/prod.tareasTotal)*100) : 0;
  const barColor = barPct >= 80 ? '#10b981' : barPct >= 50 ? '#f59e0b' : barPct === 0 ? '#d1cce8' : '#ef4444';
  const semTag = prod.usandoSemana ? ' <span style="font-size:.45rem;background:#f0ecf5;color:#9890aa;padding:1px 4px;border-radius:3px">semana</span>' : '';

  return `
  <div style="display:flex;gap:14px;align-items:center;padding:${compact?'10px 28px 0':'14px 28px 0'}">
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0">
      <div style="position:relative;width:${sz}px;height:${sz}px">
        <svg width="${sz}" height="${sz}" style="transform:rotate(-90deg)">
          <circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="#e8e3f0" stroke-width="${stroke}"/>
          <circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${stroke}"
            stroke-dasharray="${circ}" stroke-dashoffset="${offset}" stroke-linecap="round"
            style="transition:stroke-dashoffset 1s ease;filter:drop-shadow(0 0 6px ${color}44)"/>
        </svg>
        <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;line-height:1.1">
          <div style="font-size:.9rem">⏱</div>
          <div style="font-family:'Space Mono',monospace;font-size:${compact?'.68rem':'.72rem'};font-weight:800;color:${color};margin-top:1px">${pct}%</div>
        </div>
      </div>
      <div style="text-align:center">
        <div style="font-size:.52rem;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:.4px">Productividad</div>
        <div style="font-size:.58rem;font-weight:700;color:${color}">${horasStr}</div>
      </div>
    </div>
    <div style="width:1px;height:56px;background:#e0dce8;flex-shrink:0"></div>
    <div style="flex:1;min-width:0">
      <div style="font-size:.55rem;color:var(--text-dim);font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px">
        Tareas completadas${semTag}
      </div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <div style="flex:1;height:8px;background:#e8e3f0;border-radius:4px;overflow:hidden">
          <div style="height:100%;width:${barPct}%;background:${barColor};border-radius:4px;transition:width .8s ease"></div>
        </div>
        <div style="font-family:'Space Mono',monospace;font-size:.72rem;font-weight:800;color:${barColor};flex-shrink:0">${prod.tareasHechas}<span style="font-size:.55rem;color:var(--text-dim);font-weight:600">/${prod.tareasTotal}</span></div>
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        <div style="font-size:.5rem;color:var(--text-dim);font-weight:600">⏱ ${prod.minsPorTarea}min/tarea · configurable ⚙️</div>
      </div>
    </div>
  </div>`;
}

// ── STATUS ──
function getStatus(p){
  if(p>=80) return{label:"Al día",color:"#10b981",bg:"#10b98118"};
  if(p>=50) return{label:"En progreso",color:"#f59e0b",bg:"#f59e0b18"};
  return{label:"Atrasado",color:"#ef4444",bg:"#ef444418"};
}

// Helper global: calcula días laborales del mes (LUNES A SÁBADO, incluye todo el mes)
// El equipo trabaja de Lunes a Sábado. Los domingos NO cuentan.
function getMonthProgress(){
  const now = new Date();
  const year = now.getFullYear();
  const monthIdx = now.getMonth();
  const today = now.getDate();
  let transcurridos = 0;
  let totales = 0;
  const lastDay = new Date(year, monthIdx+1, 0).getDate();
  // Recorre TODO el mes desde el día 1, contando L-S (dow 1..6)
  for(let d=1; d<=lastDay; d++){
    const dow = new Date(year, monthIdx, d).getDay(); // 0=Dom, 1=Lun .. 6=Sab
    if(dow>=1 && dow<=6){
      totales++;
      if(d<=today) transcurridos++;
    }
  }
  return { transcurridos, totales, ratio: totales > 0 ? transcurridos/totales : 0 };
}

// Helper global: convierte un % "absoluto" en % proporcional al mes transcurrido
// Si la persona va al 100% de lo que iba hasta hoy, su proporcional es el % del mes que transcurrió
function toMonthProportional(absolutePct){
  const mp = getMonthProgress();
  return Math.round((absolutePct||0) * mp.ratio);
}

// ══════════════════════════════════════════════════
// HELPER: BARRA DE AVANCE DEL MES CON MARCADORES
// ══════════════════════════════════════════════════
// Renderiza una barra "termómetro" con:
//  - 4 marcadores verticales (S1, S2, S3, S4) que dividen el mes en semanas
//  - Una línea naranja vertical que marca "hoy" (% del mes transcurrido)
//  - La barra de avance pintada según el GAP vs ideal:
//      * verde  → va igual o mejor que el ideal
//      * amarillo → va al 70-100% del ideal
//      * rojo   → va < 70% del ideal
//  - Texto comparativo a la derecha: "+X pts adelantado" / "-X pts atrasado" / "🎯 en línea"
// Parámetros:
//   actualPct: % de avance ya calculado (proporcional al mes, mismo número que se ve en el ranking)
//   opts: { label, compact }
//     label: texto del título (default "Avance del mes")
//     compact: si true, render más chico para sidebars
function renderMonthProgressBar(actualPct, opts){
  opts = opts || {};
  const label = opts.label || "📆 Avance del mes";
  const compact = !!opts.compact;
  const mp = getMonthProgress();
  const idealPct = Math.round(mp.ratio * 100); // dónde DEBERÍA estar hoy
  const actual = Math.max(0, Math.min(100, actualPct||0));
  // Cálculo de estado por gap
  const gap = actual - idealPct;
  let barColor, statusText, statusColor, statusBg;
  if(idealPct === 0){
    // Mes recién empezado: no hay ideal todavía
    barColor = "#94a3b8";
    statusText = "Mes iniciando";
    statusColor = "#64748b";
    statusBg = "#e2e8f0";
  } else if(actual >= idealPct){
    barColor = "#10b981"; // verde
    statusText = gap > 5 ? `+${gap} pts adelantado` : "🎯 En línea";
    statusColor = "#10b981";
    statusBg = "#10b98115";
  } else if(actual >= idealPct * 0.7){
    barColor = "#f59e0b"; // amarillo
    statusText = `${gap} pts atrasado`;
    statusColor = "#f59e0b";
    statusBg = "#f59e0b15";
  } else {
    barColor = "#ef4444"; // rojo
    statusText = `${gap} pts atrasado`;
    statusColor = "#ef4444";
    statusBg = "#ef444415";
  }
  // Tamaños según compact
  const barH = compact ? 14 : 18;
  const labelSize = compact ? ".6rem" : ".7rem";
  const numSize = compact ? ".75rem" : ".85rem";
  const weekLabelSize = compact ? ".5rem" : ".55rem";
  const titleSize = compact ? ".65rem" : ".75rem";

  return `
  <div style="margin:${compact?'10px 0':'14px 0'};font-family:'DM Sans',sans-serif">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <div style="font-size:${titleSize};color:var(--text-mid);font-weight:700">${label}</div>
      <div style="font-size:${labelSize};color:var(--text-dim);font-weight:600">
        Día <strong style="color:var(--indigo);font-family:'Space Mono',monospace">${mp.transcurridos}</strong>/${mp.totales} laborales
      </div>
    </div>
    <!-- Barra -->
    <div style="position:relative;height:${barH}px;background:#e8e3f0;border-radius:${barH/2}px;overflow:visible;margin-top:${compact?14:18}px">
      <!-- Relleno actual -->
      <div style="position:absolute;top:0;left:0;height:100%;width:${actual}%;background:${barColor};border-radius:${barH/2}px;transition:width 1s ease;box-shadow:0 0 8px ${barColor}66"></div>
      <!-- Marcadores semanales (25%, 50%, 75%) -->
      <div style="position:absolute;top:0;left:25%;width:2px;height:100%;background:rgba(255,255,255,0.7);pointer-events:none"></div>
      <div style="position:absolute;top:0;left:50%;width:2px;height:100%;background:rgba(255,255,255,0.7);pointer-events:none"></div>
      <div style="position:absolute;top:0;left:75%;width:2px;height:100%;background:rgba(255,255,255,0.7);pointer-events:none"></div>
      <!-- Línea vertical "HOY" -->
      <div style="position:absolute;top:-4px;left:${idealPct}%;width:3px;height:${barH+8}px;background:#1a1a2e;border-radius:2px;transform:translateX(-1.5px);box-shadow:0 0 6px rgba(0,0,0,0.5);pointer-events:none;z-index:2"></div>
      <div style="position:absolute;top:-${compact?15:17}px;left:${idealPct}%;transform:translateX(-50%);font-size:.55rem;font-weight:800;color:#fff;background:#1a1a2e;padding:2px 7px;border-radius:4px;white-space:nowrap;font-family:'Space Mono',monospace;z-index:3">HOY · ${idealPct}%</div>
      <!-- Número actual al final del relleno (afuera si hay espacio, adentro si no) -->
      ${actual >= 15
        ? `<div style="position:absolute;top:50%;left:${actual}%;transform:translate(-105%,-50%);font-size:${numSize};font-weight:800;color:#fff;font-family:'Space Mono',monospace;text-shadow:0 1px 3px rgba(0,0,0,0.6);pointer-events:none;z-index:1">${actual}%</div>`
        : `<div style="position:absolute;top:50%;left:${actual}%;transform:translate(8px,-50%);font-size:${numSize};font-weight:800;color:${barColor};font-family:'Space Mono',monospace;pointer-events:none;z-index:1">${actual}%</div>`
      }
    </div>
    <!-- Etiquetas semanales debajo: 4 bloques iguales (Lun-Sáb cada uno) -->
    <div style="position:relative;height:14px;margin-top:6px;font-size:${weekLabelSize};color:var(--text-dim);font-weight:700">
      <span style="position:absolute;left:12.5%;transform:translateX(-50%)">Sem 1</span>
      <span style="position:absolute;left:37.5%;transform:translateX(-50%)">Sem 2</span>
      <span style="position:absolute;left:62.5%;transform:translateX(-50%)">Sem 3</span>
      <span style="position:absolute;left:87.5%;transform:translateX(-50%)">Sem 4</span>
    </div>
    <!-- Estado -->
    <div style="display:flex;justify-content:flex-end;margin-top:6px">
      <span style="background:${statusBg};color:${statusColor};font-size:${labelSize};font-weight:800;padding:3px 10px;border-radius:12px;border:1px solid ${statusColor}33">${statusText}</span>
    </div>
    ${opts.personaId ? renderRecoveryBox(getRecoveryPlan(opts.personaId, opts.scoreReal != null ? opts.scoreReal : actualPct), { compact }) : ''}
  </div>`;
}

// Estado de cliente contabilidad según vencimiento + avance
function getClienteEstado(cliente){
  const today = new Date().getDate();
  const venc = cliente.vencimientoDia;
  const pct = cliente.avancePct || 0;
  if(pct >= 100) return { key:'completado', label:'Completado', color:'#10b981', bg:'#10b98115', emoji:'✅' };
  if(venc != null && venc < today) return { key:'atrasado', label:'Atrasado', color:'#ef4444', bg:'#ef444415', emoji:'🔴' };
  const diasParaVenc = venc != null ? venc - today : 99;
  if(diasParaVenc <= 3 && pct < 70) return { key:'enriesgo', label:'En riesgo', color:'#f59e0b', bg:'#f59e0b15', emoji:'🟡' };
  if(diasParaVenc <= 3 && pct >= 70) return { key:'aldia', label:'Al día', color:'#06b6d4', bg:'#06b6d415', emoji:'🟢' };
  return { key:'futuro', label:'Pendiente', color:'#94a3b8', bg:'#94a3b815', emoji:'⚪' };
}

// ══════════════════════════════════════════════════
// HELPER: PLAN DE RECUPERACIÓN
// ══════════════════════════════════════════════════
// Genera acciones priorizadas para alcanzar el "Al día" (score ≥ 80%).
// El gap se mide contra 80 (no contra el ideal del mes), porque el score
// es la métrica real de productividad, no proporcional al tiempo.
//
// personaId: 'randy' | 'rody' | 'maga' | 'ledy' | 'vero' | 'hermann'
// scoreActual: % de score (0-100) — la misma métrica que se muestra en el podio
// Retorna: { resumen, acciones } o null si está al día
function getRecoveryPlan(personaId, scoreActual){
  const TARGET = 80; // umbral "Al día"
  const score = scoreActual || 0;
  if(score >= TARGET - 4) return null; // si está a 4pts o menos del target, no molesta
  const gap = score - TARGET; // negativo
  const gapAbs = Math.abs(gap);
  const acciones = [];

  // Helper interno: top N clientes contabilidad en riesgo o atrasados, ordenados por urgencia
  const topClientesUrgentes = (matchKeys, n=3) => {
    const today = new Date().getDate();
    const cl = (appData?.clientesContabilidad||[]).filter(c=>{
      const e = (c.ejecutivo||"").toLowerCase();
      return matchKeys.some(m => e.includes(m));
    });
    return cl
      .map(c => ({ ...c, _est: getClienteEstado(c) }))
      .filter(c => c._est.key === 'atrasado' || c._est.key === 'enriesgo')
      .sort((a,b) => {
        // Atrasados primero, luego por días para vencer
        if(a._est.key !== b._est.key) return a._est.key === 'atrasado' ? -1 : 1;
        return (a.vencimientoDia||99) - (b.vencimientoDia||99);
      })
      .slice(0, n);
  };

  // Helper interno: tareas diarias del detalle no tildadas hoy con menor weekPct
  const topTareasDiariasFlojas = (name, n=3) => {
    const dt = getDetalleForMember(name).map(t=>({...t,_name:getTaskName(t)})).filter(t=>t._name);
    return dt
      .filter(t => !t.todayChecked)
      .sort((a,b) => (a.weekPct||0) - (b.weekPct||0))
      .slice(0, n);
  };

  // Helper interno: tareas pendientes (no realizadas) más viejas
  const topTareasPendientesProp = (tpData, n=3) => {
    if(!tpData || !tpData.tareas) return [];
    return tpData.tareas
      .filter(t => !t.realizada)
      .slice(0, n);
  };

  switch(personaId){
    case 'randy': {
      // 100% tareas diarias del detalle
      const tareasFlojas = topTareasDiariasFlojas("Randy", 3);
      const todayCount = getDetalleForMember("Randy").filter(t=>t.todayChecked).length;
      const totalCount = getDetalleForMember("Randy").length;
      const faltan = totalCount - todayCount;
      if(faltan > 0){
        acciones.push({ icon:'📋', text:`Tildá ${faltan} tarea${faltan>1?'s':''} diaria${faltan>1?'s':''} de hoy`, detail:'Sin tildar aún' });
      }
      tareasFlojas.forEach(t=>{
        acciones.push({ icon:'⏰', text:t._name, detail:`Semana al ${t.weekPct||0}%` });
      });
      break;
    }
    case 'rody': {
      // 30% tareas + 70% clientes
      const clientesUrg = topClientesUrgentes(['rodi','rody'], 3);
      clientesUrg.forEach(c=>{
        const dias = (c.vencimientoDia||0) - new Date().getDate();
        const venceTxt = dias < 0 ? `Vencido hace ${Math.abs(dias)}d` : (dias === 0 ? 'Vence HOY' : `Vence en ${dias}d`);
        acciones.push({ icon:c._est.emoji, text:c.razonSocial||c.nombre||'Cliente', detail:`${venceTxt} · ${c.avancePct||0}%` });
      });
      // Si faltan acciones, completar con tareas diarias
      if(acciones.length < 3){
        const tareasFlojas = topTareasDiariasFlojas("Rody", 3 - acciones.length);
        tareasFlojas.forEach(t=>{
          acciones.push({ icon:'⏰', text:t._name, detail:`Semana al ${t.weekPct||0}%` });
        });
      }
      break;
    }
    case 'maga': {
      // 30% tareas pendientes + 70% clientes
      const clientesUrg = topClientesUrgentes(['maga','magal'], 3);
      clientesUrg.forEach(c=>{
        const dias = (c.vencimientoDia||0) - new Date().getDate();
        const venceTxt = dias < 0 ? `Vencido hace ${Math.abs(dias)}d` : (dias === 0 ? 'Vence HOY' : `Vence en ${dias}d`);
        acciones.push({ icon:c._est.emoji, text:c.razonSocial||c.nombre||'Cliente', detail:`${venceTxt} · ${c.avancePct||0}%` });
      });
      // Si quedan slots, agregar tareas pendientes propias
      if(acciones.length < 3){
        const pend = topTareasPendientesProp(appData.tareasPendMaga, 3 - acciones.length);
        pend.forEach(t=>{
          acciones.push({ icon:'📝', text:t.tarea, detail:t.estado || 'Pendiente' });
        });
      }
      break;
    }
    case 'ledy': {
      // Directora: cuello de botella de su equipo (Rody+Maga)
      // Tomamos los clientes urgentes de AMBOS
      const clientesRody = topClientesUrgentes(['rodi','rody'], 5);
      const clientesMaga = topClientesUrgentes(['maga','magal'], 5);
      const todos = [...clientesRody.map(c=>({...c,_resp:'Rody'})), ...clientesMaga.map(c=>({...c,_resp:'Maga'}))]
        .sort((a,b) => {
          if(a._est.key !== b._est.key) return a._est.key === 'atrasado' ? -1 : 1;
          return (a.vencimientoDia||99) - (b.vencimientoDia||99);
        })
        .slice(0,3);
      todos.forEach(c=>{
        const dias = (c.vencimientoDia||0) - new Date().getDate();
        const venceTxt = dias < 0 ? `Vencido hace ${Math.abs(dias)}d` : (dias === 0 ? 'Vence HOY' : `Vence en ${dias}d`);
        acciones.push({ icon:c._est.emoji, text:`${c.razonSocial||c.nombre||'Cliente'} (${c._resp})`, detail:`${venceTxt} · ${c.avancePct||0}%` });
      });
      break;
    }
    case 'vero': {
      // Directora de Randy → enfocar en tareas diarias de Randy
      const tareasFlojas = topTareasDiariasFlojas("Randy", 3);
      const todayCount = getDetalleForMember("Randy").filter(t=>t.todayChecked).length;
      const totalCount = getDetalleForMember("Randy").length;
      const faltan = totalCount - todayCount;
      if(faltan > 0){
        acciones.push({ icon:'📋', text:`Randy debe tildar ${faltan} tarea${faltan>1?'s':''} de hoy`, detail:'Sin tildar aún' });
      }
      tareasFlojas.slice(0, 3 - acciones.length).forEach(t=>{
        acciones.push({ icon:'⏰', text:t._name, detail:`Semana al ${t.weekPct||0}%` });
      });
      break;
    }
    case 'hermann': {
      // Director Ejecutivo: prioridades globales del Grupo G
      // Mezcla clientes urgentes de TODO el equipo + flagging del cuello de botella
      const clientesRody = topClientesUrgentes(['rodi','rody'], 3);
      const clientesMaga = topClientesUrgentes(['maga','magal'], 3);
      const todos = [...clientesRody.map(c=>({...c,_resp:'Rody'})), ...clientesMaga.map(c=>({...c,_resp:'Maga'}))]
        .sort((a,b) => {
          if(a._est.key !== b._est.key) return a._est.key === 'atrasado' ? -1 : 1;
          return (a.vencimientoDia||99) - (b.vencimientoDia||99);
        })
        .slice(0,3);
      todos.forEach(c=>{
        const dias = (c.vencimientoDia||0) - new Date().getDate();
        const venceTxt = dias < 0 ? `Vencido hace ${Math.abs(dias)}d` : (dias === 0 ? 'Vence HOY' : `Vence en ${dias}d`);
        acciones.push({ icon:c._est.emoji, text:`${c.razonSocial||c.nombre||'Cliente'} (${c._resp})`, detail:`${venceTxt} · ${c.avancePct||0}%` });
      });
      break;
    }
  }

  if(acciones.length === 0) return null;

  // Generar resumen según severidad (gap contra el target 80%)
  let resumen;
  if(gapAbs >= 40) resumen = `Plan urgente para llegar al 80% (faltan ${gapAbs} pts):`;
  else if(gapAbs >= 20) resumen = `Plan de recuperación (faltan ${gapAbs} pts para 80%):`;
  else resumen = `Para llegar al 80% (faltan ${gapAbs} pts):`;

  return { resumen, acciones: acciones.slice(0,3) };
}

// Renderiza el cuadro visual del plan de recuperación
// ══════════════════════════════════════════════════
// HELPER: RELOJ DE PRODUCTIVIDAD POR PERSONA
// ══════════════════════════════════════════════════
// Muestra hora actual + estado del día laboral según horario REAL de VG EAS:
//   Lunes a Viernes: 08:00 - 17:00
//   Sábados:         08:00 - 12:00
//   Domingos:        no se trabaja → reloj OCULTO
//
// Fuera del horario laboral el reloj se OCULTA (no ocupa espacio).
// Es la BASE para futuras métricas de timestamps reales (Fase 2 y 3).
function renderProductividadReloj(opts){
  opts = opts || {};
  const compact = !!opts.compact;
  // Forzar zona horaria GMT-3 (Asunción) sin importar el navegador
  const nowAsuncion = new Date(new Date().toLocaleString('en-US', { timeZone: 'America/Asuncion' }));
  const hh = nowAsuncion.getHours();
  const mm = nowAsuncion.getMinutes();
  const dow = nowAsuncion.getDay(); // 0=dom, 1=lun, ..., 6=sab
  const isSabado = dow === 6;
  const isDomingo = dow === 0;

  // Si es domingo, no trabajan → ocultar reloj
  if(isDomingo) return '';

  // Definir horario laboral según día
  const inicioH = 8;
  const finH = isSabado ? 12 : 17;

  // Si es antes de las 8 AM o después del cierre → ocultar reloj
  if(hh < inicioH || hh >= finH) return '';

  // Determinar fase del día (dentro del horario laboral)
  let estado, color, bg, emoji;
  if(!isSabado && hh >= 12 && hh < 13){
    // Pausa almuerzo solo lun-vie
    estado = "Pausa almuerzo"; color = "#f59e0b"; bg = "#f59e0b15"; emoji = "🍴";
  } else if(hh < 12){
    estado = "Mañana productiva"; color = "#10b981"; bg = "#10b98115"; emoji = "🌅";
  } else {
    // Tarde (solo lun-vie, porque sab cierra a las 12)
    estado = "Tarde activa"; color = "#e8782a"; bg = "#e8782a15"; emoji = "⚡";
  }

  // Calcular % del día laboral transcurrido
  const totalMin = (finH - inicioH) * 60;
  let trMin = (hh - inicioH) * 60 + mm;
  trMin = Math.max(0, Math.min(totalMin, trMin));
  const pctDia = Math.round((trMin / totalMin) * 100);

  // Cuánto falta para cerrar
  const minsRestantes = totalMin - trMin;
  const hRest = Math.floor(minsRestantes / 60);
  const mRest = minsRestantes % 60;
  const restanteTxt = hRest > 0 ? `${hRest}h ${mRest}m` : `${mRest}m`;

  const hhStr = String(hh).padStart(2,'0');
  const mmStr = String(mm).padStart(2,'0');

  // Tamaños según compact
  const clockSize = compact ? '1.4rem' : '1.7rem';
  const labelSize = compact ? '.55rem' : '.62rem';
  const padding = compact ? '8px 10px' : '10px 14px';

  return `
  <div style="display:flex;align-items:center;gap:10px;background:${bg};border:1px solid ${color}33;border-left:4px solid ${color};border-radius:10px;padding:${padding};margin-top:10px">
    <div style="font-size:1.4rem;flex-shrink:0">${emoji}</div>
    <div style="flex:1;min-width:0">
      <div style="display:flex;align-items:baseline;gap:6px;flex-wrap:wrap">
        <div style="font-family:'Space Mono',monospace;font-size:${clockSize};font-weight:800;color:${color};line-height:1">${hhStr}:${mmStr}</div>
        <div style="font-size:${labelSize};color:${color};font-weight:700;text-transform:uppercase;letter-spacing:.3px">${estado}</div>
      </div>
      <div style="display:flex;align-items:center;gap:6px;margin-top:5px">
        <div style="flex:1;height:4px;background:#e0dce8;border-radius:2px;overflow:hidden">
          <div style="height:100%;width:${pctDia}%;background:${color};border-radius:2px;transition:width 1s ease"></div>
        </div>
        <div style="font-size:.5rem;color:${color};font-weight:700;font-family:'Space Mono',monospace;white-space:nowrap">${pctDia}% · falta ${restanteTxt}</div>
      </div>
    </div>
  </div>`;
}

// ══════════════════════════════════════════════════
// HELPER: TAREAS PENDIENTES POR PERSONA
// ══════════════════════════════════════════════════
// Devuelve array unificado de items pendientes (no realizados aún) para una persona.
// Cada item tiene: { id, tarea, estado, esCliente, vencimientoDia, avancePct }
// - Para Randy: lee de appData.randyTareasPend (tareas puntuales)
// - Para Maga: lee de appData.tareasPendMaga (tareas puntuales) + clientes urgentes
// - Para Rody: lee de clientes contabilidad urgentes (no tiene tareas puntuales)
function getPendientesPersona(personaId){
  const items = [];
  if(personaId === 'randy'){
    // Fuente 1: Tareas puntuales (API randyTareasPend) — si está disponible
    const tp = appData?.randyTareasPend;
    if(tp && tp.tareas){
      tp.tareas.filter(t=>!t.realizada).forEach(t=>{
        items.push({
          tarea: t.tarea,
          estado: t.estado || (t.enProceso ? 'En proceso' : 'Pendiente'),
          enProceso: !!t.enProceso,
          tipo: 'tarea'
        });
      });
    }
    // Fuente 2: SOLO agregar rutinas si NO hay tareas del Sheet
    // (evitar duplicados y dar prioridad al Sheet)
    if(items.length === 0){
      const detalle = getDetalleForMember("Randy")
        .map(t=>({...t,_name:getTaskName(t)}))
        .filter(t=>t._name);
      detalle.forEach(t => {
        const wp = t.weekPct || 0;
        if(wp < 100){
          let estado, enProceso;
          if(wp === 0){ estado = 'Sin iniciar'; enProceso = false; }
          else { estado = `En progreso (${wp}%)`; enProceso = true; }
          items.push({
            tarea: t._name,
            estado,
            enProceso,
            tipo: 'rutina',
            weekPct: wp
          });
        }
      });
    }
  } else if(personaId === 'maga'){
    const tp = appData?.tareasPendMaga;
    if(tp && tp.tareas){
      tp.tareas.filter(t=>!t.realizada).forEach(t=>{
        items.push({
          tarea: t.tarea,
          estado: t.estado || (t.enProceso ? 'En proceso' : 'Pendiente'),
          enProceso: !!t.enProceso,
          tipo: 'tarea'
        });
      });
    }
    // Sumar clientes urgentes (atrasados o en riesgo)
    const cli = getClientesContabilidad(['magal']);
    cli.forEach(c => {
      const est = getClienteEstado(c);
      if(est.key === 'atrasado' || est.key === 'enriesgo'){
        items.push({
          tarea: c.razonSocial || c.nombre || 'Cliente',
          estado: est.label,
          enProceso: false,
          tipo: 'cliente',
          vencimientoDia: c.vencimientoDia,
          avancePct: c.avancePct || 0,
          estadoKey: est.key,
          emoji: est.emoji
        });
      }
    });
  } else if(personaId === 'rody'){
    // Fuente 1: Tareas puntuales de la planilla "Tareas pendientes Rodolfo Peters"
    const tp = appData?.rodyTareasPend;
    if(tp && tp.tareas){
      tp.tareas.filter(t=>!t.realizada).forEach(t=>{
        items.push({
          tarea: t.tarea,
          estado: t.estado || (t.enProceso ? 'En proceso' : 'Pendiente'),
          enProceso: !!t.enProceso,
          tipo: 'tarea'
        });
      });
    }
    // Fuente 2: clientes contabilidad urgentes
    const cli = getClientesContabilidad(['rodi','rody']);
    cli.forEach(c => {
      const est = getClienteEstado(c);
      if(est.key === 'atrasado' || est.key === 'enriesgo'){
        items.push({
          tarea: c.razonSocial || c.nombre || 'Cliente',
          estado: est.label,
          enProceso: false,
          tipo: 'cliente',
          vencimientoDia: c.vencimientoDia,
          avancePct: c.avancePct || 0,
          estadoKey: est.key,
          emoji: est.emoji
        });
      }
    });
    // Fuente 3: Tareas diarias rutinarias del detalle que NO están al 100%
    const detalle = getDetalleForMember("Rody")
      .map(t=>({...t,_name:getTaskName(t)}))
      .filter(t=>t._name);
    detalle.forEach(t => {
      const wp = t.weekPct || 0;
      if(wp < 100){
        let estado, enProceso;
        if(wp === 0){ estado = 'Sin iniciar'; enProceso = false; }
        else { estado = `En progreso (${wp}%)`; enProceso = true; }
        items.push({
          tarea: t._name,
          estado,
          enProceso,
          tipo: 'rutina',
          weekPct: wp
        });
      }
    });
  }
  // Ordenar por urgencia real:
  //   0. Clientes atrasados (vencidos)
  //   1. Clientes en riesgo (vencen pronto)
  //   2. Tareas puntuales SIN iniciar (más urgentes: ni siquiera arrancaron)
  //   3. Tareas puntuales en proceso (al menos hay avance)
  //   4. Rutinas sin iniciar
  //   5. Rutinas en progreso
  items.sort((a,b) => {
    const score = (it) => {
      if(it.tipo === 'cliente' && it.estadoKey === 'atrasado') return 0;
      if(it.tipo === 'cliente' && it.estadoKey === 'enriesgo') return 1;
      if(it.tipo === 'tarea' && !it.enProceso) return 2; // pendiente sin arrancar
      if(it.tipo === 'tarea' && it.enProceso) return 3;
      if(it.tipo === 'rutina' && !it.enProceso) return 4;
      if(it.tipo === 'rutina' && it.enProceso) return 5;
      return 6;
    };
    return score(a) - score(b);
  });
  return items;
}

// ══════════════════════════════════════════════════
// HELPER: BADGE PEQUEÑO DE PENDIENTES (para podio)
// ══════════════════════════════════════════════════
// Genera el badge "📋 X pendientes" o "🎉 Sin pendientes"
function renderPendientesBadge(personaId, isFirst){
  const items = getPendientesPersona(personaId);
  const n = items.length;
  if(n === 0){

// ══════════════════════════════════════════════════
// HELPER GLOBAL: SCORES REALES (no proporcionales al mes)
// ══════════════════════════════════════════════════
// Calcula los scores REALES de productividad de cada persona, idénticos
// a los que se muestran en el podio del ranking. Se cachea en window._realScores
// para que todas las cards (Hermann, Ledy, Vero) muestren los mismos números.
//
// Fórmulas:
//   randy = 100% promedio weekPct de tareas diarias del detalle
//   rody  = 30% promedio weekPct + 70% okPct clientes contabilidad
//   maga  = 30% % tareas pendientes realizadas + 70% okPct clientes contabilidad
//   ledy  = promedio (rody, maga)
//   vero  = randy
//   hermann = promedio (rody, maga, randy)
function computeRealScores(){
  if(!appData) return null;

  // Helper interno: estado de cliente (mismo cálculo que el ranking)
  const estadoCli = (c) => {
    const today = new Date().getDate();
    const venc = c.vencimientoDia;
    const pct = c.avancePct || 0;
    if(pct >= 100) return 'completado';
    if(venc != null && venc < today) return 'atrasado';
    const diasParaVenc = venc != null ? venc - today : 99;
    if(diasParaVenc <= 3 && pct < 70) return 'enriesgo';
    if(diasParaVenc <= 3 && pct >= 70) return 'aldia';
    return 'futuro';
  };
  // Helper interno: okPct de un set de clientes
  const okPctClientes = (matchKeys) => {
    const cl = (appData?.clientesContabilidad||[]).filter(c=>{
      const e = (c.ejecutivo||"").toLowerCase();
      return matchKeys.some(m => e.includes(m));
    });
    const stats = {completado:0, aldia:0, enriesgo:0, atrasado:0, futuro:0};
    cl.forEach(c => { stats[estadoCli(c)]++; });
    const urgentes = stats.completado + stats.aldia + stats.enriesgo + stats.atrasado;
    const ok = stats.completado + stats.aldia;
    return { okPct: urgentes > 0 ? Math.round((ok / urgentes) * 100) : 100, total: cl.length };
  };
  // Helper interno: weekAvg de tareas del detalle de una persona
  const weekAvgDetalle = (name) => {
    const dt = getDetalleForMember(name).map(t=>({...t,_name:getTaskName(t)})).filter(t=>t._name);
    return dt.length>0 ? Math.round(dt.reduce((s,t)=>s+(t.weekPct||0),0)/dt.length) : 0;
  };

  // RANDY: 100% tareas diarias
  const randyScore = weekAvgDetalle("Randy");

  // RODY: 30% tareas diarias + 70% clientes contabilidad (fórmula original del brief)
  const rodyTareas = weekAvgDetalle("Rody");
  const rodyCli = okPctClientes(["rodi","rody"]);
  const rodyScore = rodyCli.total > 0
    ? Math.round(rodyTareas * 0.3 + rodyCli.okPct * 0.7)
    : rodyTareas;

  // MAGA: 30% tareas pendientes + 70% clientes contabilidad (fórmula original del brief)
  const magaTP = appData.tareasPendMaga;
  const magaTareas = (magaTP && magaTP.total > 0)
    ? Math.round((magaTP.realizadas / magaTP.total) * 100)
    : 0;
  const magaCli = okPctClientes(["magal"]);
  const magaScore = magaCli.total > 0
    ? Math.round(magaTareas * 0.3 + magaCli.okPct * 0.7)
    : magaTareas;

  // LEDY: promedio Rody + Maga
  const ledyScore = Math.round((rodyScore + magaScore) / 2);
  // VERO: igual a Randy
  const veroScore = randyScore;
  // HERMANN: promedio del equipo completo (Rody, Maga, Randy)
  const hermannScore = Math.round((rodyScore + magaScore + randyScore) / 3);

  return {
    randy: randyScore,
    rody: rodyScore,
    maga: magaScore,
    ledy: ledyScore,
    vero: veroScore,
    hermann: hermannScore
  };
}

// Ordenar clientes por urgencia: atrasados → en riesgo → al día → futuros → completados
function sortClientesByUrgencia(clientes){
  const orden = {atrasado:0, enriesgo:1, aldia:2, futuro:3, completado:4};
  return [...clientes].sort((a,b)=>{
    const ea = getClienteEstado(a).key;
    const eb = getClienteEstado(b).key;
    if(orden[ea] !== orden[eb]) return orden[ea] - orden[eb];
    // mismo estado: por día de vencimiento ascendente
    return (a.vencimientoDia||99) - (b.vencimientoDia||99);
  });
}

// UPDATE PARCIAL: actualiza solo los gauges sin re-render completo
// Evita que el panel de config se cierre al cambiar valores
// ══════════════════════════════════════════════════
function updateGaugesOnly(){
  const ids = ['randy','rody','maga','ledy','vero','hermann'];
  ids.forEach(id => {
    const el = document.getElementById('dual-gauge-'+id);
    if(el) el.innerHTML = renderDualGauges(id, true);
  });
  // También actualizar los gauges del podio (solo el contenido interno)
  ['randy','rody','maga'].forEach(id => {
    const el = document.getElementById('podio-gauge-'+id);
    if(!el) return;
    const prod = computeProductividadPersona(id);
    const horasPct = prod.pctHoras;
    const horasColor = horasPct >= 80 ? '#10b981' : horasPct >= 50 ? '#f59e0b' : horasPct === 0 ? '#d1cce8' : '#ef4444';
    const horasStr = prod.horasEstimadas >= 1 ? prod.horasEstimadas.toFixed(1)+'h' : prod.tareasHechas > 0 ? Math.round(prod.horasEstimadas*60)+'min' : '—';
    const circle = el.querySelector('circle:last-child');
    if(circle){
      const r = parseFloat(circle.getAttribute('r'));
      const circ = 2*Math.PI*r;
      circle.setAttribute('stroke-dashoffset', circ-(horasPct/100)*circ);
      circle.setAttribute('stroke', horasColor);
    }
    const pctEl = el.querySelector('[data-pct]');
    if(pctEl) pctEl.textContent = horasPct+'%';
  });
}

// RENDER: GAUGE MINI PARA EL PODIO
// ══════════════════════════════════════════════════
function renderPodioGauge(personaId, isFirst){
  // Siempre visible — no depende de horario ni día de semana
  const prod = computeProductividadPersona(personaId);
  const horasPct = prod.pctHoras || 0;

  // Color del gauge según nivel de productividad
  const color = horasPct >= 80 ? '#10b981'
               : horasPct >= 50 ? '#f59e0b'
               : horasPct === 0  ? 'rgba(255,255,255,0.3)'
               : '#ef4444';

  const sz = isFirst ? 88 : 72;
  const stroke = isFirst ? 7 : 6;
  const r = (sz - stroke) / 2;
  const circ = 2 * Math.PI * r;
  const offset = circ - (horasPct / 100) * circ;

  // Texto interior: número de tareas o % según tamaño
  const horasStr = prod.horasEstimadas >= 1
    ? prod.horasEstimadas.toFixed(1) + 'h'
    : prod.tareasHechas === 0 ? '—' : Math.round(prod.horasEstimadas * 60) + 'm';

  // Etiqueta debajo
  const tareasStr = prod.tareasTotal > 0
    ? `${prod.tareasHechas}/${prod.tareasTotal} tareas`
    : 'Sin tareas aún';

  // Color de fondo del texto según isFirst (sobre naranja o gris)
  const textColor = isFirst ? '#fff' : color;
  const subColor  = isFirst ? 'rgba(255,255,255,0.75)' : 'var(--text-dim)';

  return `<div style="display:flex;flex-direction:column;align-items:center;gap:4px;margin-top:10px">
    <div style="position:relative;width:${sz}px;height:${sz}px">
      <svg width="${sz}" height="${sz}" style="transform:rotate(-90deg)">
        <circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="${stroke}"/>
        <circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${stroke}"
          stroke-dasharray="${circ}" stroke-dashoffset="${offset}" stroke-linecap="round"
          style="transition:stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1);filter:drop-shadow(0 0 5px ${color}88)"/>
      </svg>
      <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;line-height:1.1">
        <div style="font-size:${isFirst?'.65rem':'.55rem'};margin-bottom:1px">⏱</div>
        <div style="font-family:'Space Mono',monospace;font-size:${isFirst?'.75rem':'.6rem'};font-weight:800;color:${textColor}">${horasPct}%</div>
        <div style="font-size:${isFirst?'.5rem':'.45rem'};font-weight:700;color:${subColor};margin-top:1px">${horasStr}</div>
      </div>
    </div>
    <div style="text-align:center">
      <div style="font-size:.5rem;font-weight:800;color:${textColor};text-transform:uppercase;letter-spacing:.3px">Productividad</div>
      <div style="font-size:.48rem;color:${subColor};margin-top:1px">${tareasStr}</div>
    </div>
  </div>`;
}

// ── FETCH DATA ──
async function fetchData(){
  try {
    // Cache-busting: agregar timestamp a cada URL
    const ts = Date.now();
    const bust = (url) => url + (url.includes('?') ? '&' : '?') + '_t=' + ts;
    
    // Cargar TODAS las APIs en paralelo
    const [resMain, resPend, resVenc, resRody, resCobros] = await Promise.all([
      fetch(bust(API_URL), {cache:'no-store'}).catch(e=>null),
      fetch(bust(API_PENDIENTES), {cache:'no-store'}).catch(e=>null),
      fetch(bust(API_VENCIMIENTOS), {cache:'no-store'}).catch(e=>null),
      fetch(bust(API_RODY_TAREAS), {cache:'no-store'}).catch(e=>null),
      fetch(bust(API_COBROS), {cache:'no-store'}).catch(e=>null)
    ]);

    // API principal (obligatoria)
    const json = await resMain.json();
    if(json.error) throw new Error(json.error);
    appData = json;
    if(json.month?.currentWeek) activeWeek = json.month.currentWeek;

    // APIs secundarias (opcionales, no bloquean)
    try{
      if(resPend){ const p=await resPend.json(); if(p.pendientesCobro) appData.pendientesCobro=p.pendientesCobro; }
    }catch(e){ console.log("Pendientes no disponible:",e); }

    try{
      if(resVenc){ const v=await resVenc.json(); if(v.vencimientos) appData.vencimientos=v.vencimientos; }
    }catch(e){ console.log("Vencimientos no disponible:",e); }
    try{
      if(resRody){ const rd=await resRody.json(); if(rd.rodyTareasPend) appData.rodyTareasPend=rd.rodyTareasPend; }
    }catch(e){ console.log("Tareas Rody no disponible:",e); }
    try{
      if(resCobros){
        const cb = await resCobros.json();
        if(!cb.error && cb.clientes){
          appData.cobrosCartera = cb;
          // Actualizar COBROS_DATA con datos en vivo (ICHO y COLMENA)
          cb.clientes.forEach(clienteApi => {
            const idx = COBROS_DATA.clientes.findIndex(c =>
              c.nombre.toUpperCase() === clienteApi.nombre.toUpperCase()
            );
            if(idx >= 0){
              COBROS_DATA.clientes[idx] = {
                ...COBROS_DATA.clientes[idx],
                totalACobrar: clienteApi.totalACobrar || 0,
                cobrado:      clienteApi.cobrado || 0,
                estado:       clienteApi.estado || 'pendiente',
                vencimiento:  clienteApi.vencimientoProximo
                              ? new Date(clienteApi.vencimientoProximo).getDate()
                              : null,
                facturas:     clienteApi.facturas || [],
                pendientesCount: clienteApi.pendientesCount || 0,
                nota:         clienteApi.nota || '',
                antiguedadResumen: clienteApi.antiguedadResumen || null
              };
            }
          });
          COBROS_DATA.ultimaActualizacion = cb.ultimaActualizacion || new Date().toISOString();
          // Tareas Randy vienen junto con cobros
          if (cb.randyTareasPend) appData.randyTareasPend = cb.randyTareasPend;
        }
      }
    }catch(e){ console.log("Cobros no disponible:",e); }

    // Un solo render con todos los datos
    render();

    // ── RANDY TAREAS: ya viene incluido en API_COBROS (randyTareasPend) ──────
    // No se necesita llamada separada. API_COBROS devuelve cobros + tareas Randy
    // en una sola respuesta, evitando race conditions en móvil y reduciendo
    // el número de llamadas a Google Apps Script.
    

    
  }catch(err){
    document.getElementById("app").innerHTML=`
      <div class="loading">
        <div style="font-size:64px;margin-bottom:20px">⚠️</div>
        <p style="color:#ef4444;font-weight:700;font-size:1.2rem">Error al cargar datos</p>
        <p style="color:var(--text-mid);margin-top:10px">${err.message}</p>
        <button onclick="fetchData()" style="margin-top:28px;padding:14px 32px;border-radius:12px;border:none;background:#623F98;color:#fff;font-size:1rem;font-weight:700;cursor:pointer">Reintentar</button>
      </div>`;
  }
}

// ── HELPERS ──
function getMemberWeekStats(member){
  const week=member.weeks?.find(w=>w.weekNumber===activeWeek);
  if(!week||!week.tasks?.length)return{avgPct:0,tasks:[],taskCount:0};
  return{avgPct:week.avgPct||0,tasks:week.tasks,taskCount:week.tasks.length};
}

function getDetalleForMember(name){
  if(!appData?.detalle?.tasks) return[];
  return appData.detalle.tasks.filter(t=>t.responsable?.toLowerCase().includes(name.toLowerCase()));
}

// Resolver inteligente: devuelve el mejor nombre de tarea disponible
// (la API principal a veces mapea mal y pone el num de fila en .tarea)
function getTaskName(task){
  const candidates = [task.tarea, task.detalle, task.descripcion, task.nombre, task.empresa];
  for(const c of candidates){
    if(c && isNaN(c) && String(c).trim()!=='') return String(c).trim();
  }
  return null; // ninguna válida
}

function getTareasVariasHoy(name){
  if(!appData?.tareasVarias) return[];
  const today=new Date().toISOString().slice(0,10);
  return appData.tareasVarias.filter(t=>t.responsable.toLowerCase().includes(name.toLowerCase())&&t.fecha===today);
}

function estadoStyle(estado){
  const s=String(estado).toLowerCase();
  if(s.includes("complet")||s.includes("hecho")||s.includes("done")) return{color:"#10b981",bg:"#10b98122"};
  if(s.includes("progreso")||s.includes("haciendo")||s.includes("proceso")) return{color:"#f59e0b",bg:"#f59e0b22"};
  if(s.includes("pendiente")||s.includes("nuevo")) return{color:"#6366f1",bg:"#6366f122"};
  return{color:"#94a3b8",bg:"#94a3b822"};
}

function renderAntiguedadBloque(res){
  const buckets = [
    {k:'0-30d',  color:'#10b981', label:'Corriente'},
    {k:'31-60d', color:'#f59e0b', label:'30-60d'},
    {k:'61-90d', color:'#ef4444', label:'60-90d'},
    {k:'+90d',   color:'#7f1d1d', label:'+90d'},
  ];
  const items = buckets.map(b => {
    const val = res[b.k]||0;
    if(val > 0) return `<div style="background:${b.color}15;border-radius:6px;padding:5px 6px;border-left:3px solid ${b.color}">
      <div style="font-size:.45rem;font-weight:700;color:${b.color};text-transform:uppercase">${b.label}</div>
      <div style="font-family:'Space Mono',monospace;font-size:.55rem;font-weight:800;color:${b.color}">₲ ${val.toLocaleString('es-PY')}</div>
    </div>`;
    return `<div style="background:#f5f3f8;border-radius:6px;padding:5px 6px;opacity:.4">
      <div style="font-size:.45rem;color:var(--text-dim);text-transform:uppercase">${b.label}</div>
      <div style="font-size:.55rem;color:var(--text-dim)">—</div>
    </div>`;
  }).join('');
  return `<div style="margin-top:8px;border-top:1px solid #f0eef5;padding-top:8px">
    <div style="font-size:.5rem;font-weight:800;color:var(--text-dim);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px">Antigüedad de mora</div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:4px">${items}</div>
  </div>`;
}

function renderCobrosCartera(){
  const data = COBROS_DATA;
  const hoy = new Date().getDate();
  const fmtGs = (n) => n > 0 ? '₲ ' + n.toLocaleString('es-PY') : '—';

  // Estado visual
  const estadoStyle = (est, venc) => {
    if(est === 'aldia')     return { color:'#10b981', bg:'#10b98115', border:'#10b98133', emoji:'✅', label:'Al día' };
    if(est === 'atrasado')  return { color:'#ef4444', bg:'#ef444415', border:'#ef444433', emoji:'🔴', label:'Atrasado' };
    if(est === 'enGestion') return { color:'#f59e0b', bg:'#f59e0b15', border:'#f59e0b33', emoji:'🔄', label:'En gestión' };
    // pendiente: si tiene vencimiento, calcular urgencia
    if(venc != null){
      const dias = venc - hoy;
      if(dias < 0)  return { color:'#ef4444', bg:'#ef444415', border:'#ef444433', emoji:'⚠️', label:'Vencido' };
      if(dias <= 3) return { color:'#f59e0b', bg:'#f59e0b15', border:'#f59e0b33', emoji:'🟡', label:`Vence en ${dias}d` };
    }
    return { color:'#94a3b8', bg:'#94a3b815', border:'#94a3b833', emoji:'⚪', label:'Pendiente' };
  };

  // Totales
  const totalCobrar  = data.clientes.reduce((s,c) => s + (c.totalACobrar||0), 0);
  const totalCobrado = data.clientes.reduce((s,c) => s + (c.cobrado||0), 0);
  const totalPend    = totalCobrar - totalCobrado;
  const pctCobrado   = totalCobrar > 0 ? Math.round((totalCobrado/totalCobrar)*100) : 0;
  const cobradoColor = pctCobrado >= 80 ? '#10b981' : pctCobrado >= 50 ? '#f59e0b' : '#ef4444';

  const internos  = data.clientes.filter(c => c.tipo === 'interno');
  const externos  = data.clientes.filter(c => c.tipo === 'externo');

  const isManual = !data.ultimaActualizacion;
  const srcTag = isManual
    ? `<span class="src-tag" style="background:#f59e0b15;color:#f59e0b">⚠️ Datos manuales · pendiente conexión Sheet</span>`
    : `<span class="src-tag">📡 En vivo · ${new Date(data.ultimaActualizacion).toLocaleString('es-PY')}</span>`;

  const renderCliente = (c) => {
    const est = estadoStyle(c.estado, c.vencimiento);
    const pendiente = (c.totalACobrar||0) - (c.cobrado||0);
    const pct = c.totalACobrar > 0 ? Math.round((c.cobrado/c.totalACobrar)*100) : 0;
    const barColor = pct >= 80 ? '#10b981' : pct >= 40 ? '#f59e0b' : '#ef4444';
    const vencLabel = c.vencimiento != null ? `Día ${c.vencimiento}` : 'Sin fecha';
    const diasLabel = c.vencimiento != null
      ? (c.vencimiento - hoy < 0 ? `Vencido hace ${Math.abs(c.vencimiento-hoy)}d` : c.vencimiento - hoy === 0 ? 'HOY' : `En ${c.vencimiento-hoy}d`)
      : '';
    const tieneFacturas = c.facturas && c.facturas.length > 0;
    const enVivo = COBROS_DATA.ultimaActualizacion !== null;

    // Detalle de facturas (solo cuando vienen de la API)
    const facturasHtml = tieneFacturas ? c.facturas.filter(f => f.estado !== 'aldia').slice(0,5).map(f => {
      const fEst = f.estado === 'atrasado' ? {color:'#ef4444',bg:'#ef444415',emoji:'🔴'} :
                   f.estado === 'enGestion' ? {color:'#f59e0b',bg:'#f59e0b15',emoji:'🟡'} :
                   {color:'#94a3b8',bg:'#94a3b815',emoji:'⚪'};
      const vencFact = f.vencimiento ? `Vence ${f.vencimiento}` : '';
      const diasFact = f.diasParaVencer != null
        ? (f.diasParaVencer < 0 ? `⚠️ Vencida hace ${Math.abs(f.diasParaVencer)}d` : f.diasParaVencer === 0 ? '🔥 Vence HOY' : `${f.diasParaVencer}d`)
        : '';
      return `<div style="display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid #f0eef5">
        <span style="font-size:.7rem">${fEst.emoji}</span>
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:6px">
            <div style="font-size:.6rem;font-weight:700;color:#1a1a2e;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1">${f.label||f.razonSocial||f.concepto}</div>
            ${f.antiguedad ? `<span style="font-size:.45rem;font-weight:800;padding:1px 5px;border-radius:3px;white-space:nowrap;background:${f.antiguedad==='+90d'?'#ef444420':f.antiguedad==='61-90d'?'#f59e0b20':f.antiguedad==='31-60d'?'#f59e0b10':'#10b98110'};color:${f.antiguedad==='+90d'?'#ef4444':f.antiguedad==='61-90d'?'#f59e0b':f.antiguedad==='31-60d'?'#f59e0b':'#10b981'}">${f.antiguedad}</span>` : ''}
          </div>
          ${f.observacion ? `<div style="font-size:.5rem;color:var(--text-dim);font-style:italic;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${f.observacion}</div>` : ''}
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div style="font-family:'Space Mono',monospace;font-size:.6rem;font-weight:800;color:${fEst.color}">${fmtGs(f.monto)}</div>
          ${diasFact ? `<div style="font-size:.45rem;color:${fEst.color};font-weight:700">${diasFact}</div>` : ''}
        </div>
      </div>`;
    }).join('') : '';

    return `<div style="background:#fff;border-radius:10px;border:1px solid ${est.border};border-left:4px solid ${est.color};padding:12px 14px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <span style="font-size:.9rem">${est.emoji}</span>
        <div style="flex:1;min-width:0">
          <div style="font-size:.8rem;font-weight:800;color:#1a1a2e">${c.nombre}
            ${enVivo ? '<span style="font-size:.42rem;background:#10b98115;color:#10b981;padding:2px 5px;border-radius:3px;margin-left:4px;font-weight:700">📡 VIVO</span>' : ''}
            ${c.pendientesCount > 0 ? `<span style="font-size:.42rem;background:#ef444415;color:#ef4444;padding:2px 5px;border-radius:3px;margin-left:4px;font-weight:700">${c.pendientesCount} fact. pend.</span>` : ''}
          </div>
          <div style="font-size:.55rem;color:var(--text-dim)">👤 ${c.responsable} · 📅 ${vencLabel}${diasLabel?' · '+diasLabel:''}</div>
          ${c.fuente ? `<div style="font-size:.45rem;color:#9890aa;margin-top:2px;font-style:italic">📂 ${c.fuente}</div>` : ''}
        </div>
        <span style="font-size:.55rem;font-weight:700;padding:3px 8px;border-radius:6px;background:${est.bg};color:${est.color};white-space:nowrap">${est.label}</span>
      </div>
      <!-- Barra de cobro -->
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
        <div style="flex:1;height:6px;background:#e8e3f0;border-radius:3px;overflow:hidden">
          <div style="height:100%;width:${pct}%;background:${barColor};border-radius:3px;transition:width .8s ease"></div>
        </div>
        <div style="font-family:'Space Mono',monospace;font-size:.6rem;font-weight:800;color:${barColor};flex-shrink:0">${pct}%</div>
      </div>
      <!-- Montos -->
      <div class="cobros-montos" style="display:flex;gap:6px;margin-bottom:${facturasHtml?'10px':'0'}">
        <div style="flex:1;background:#10b98110;border-radius:6px;padding:5px 8px;text-align:center">
          <div style="font-size:.48rem;color:#10b981;font-weight:700;text-transform:uppercase">Cobrado</div>
          <div style="font-family:'Space Mono',monospace;font-size:.62rem;font-weight:800;color:#10b981">${fmtGs(c.cobrado)}</div>
        </div>
        <div style="flex:1;background:#ef444410;border-radius:6px;padding:5px 8px;text-align:center">
          <div style="font-size:.48rem;color:#ef4444;font-weight:700;text-transform:uppercase">Pendiente</div>
          <div style="font-family:'Space Mono',monospace;font-size:.62rem;font-weight:800;color:#ef4444">${fmtGs(pendiente)}</div>
        </div>
        <div style="flex:1;background:#62309810;border-radius:6px;padding:5px 8px;text-align:center">
          <div style="font-size:.48rem;color:#623098;font-weight:700;text-transform:uppercase">Total</div>
          <div style="font-family:'Space Mono',monospace;font-size:.62rem;font-weight:800;color:#623098">${fmtGs(c.totalACobrar)}</div>
        </div>
      </div>
      <!-- Detalle facturas pendientes (solo con datos en vivo) -->
      ${facturasHtml ? `<div style="border-top:1px solid #f0eef5;padding-top:8px">${facturasHtml}</div>` : ''}
      ${c.antiguedadResumen ? renderAntiguedadBloque(c.antiguedadResumen) : ''}
      ${c.nota ? `<div style="margin-top:6px;font-size:.58rem;color:var(--text-dim);font-style:italic">💬 ${c.nota}</div>` : ''}
    </div>`;
  };

  return `
  <div class="divider"></div>
  <div class="task-section">
    <div class="section-title" style="margin-bottom:12px">
      <span class="icon">💰</span> Gestión de Cobros — Cartera VG Administración
      ${srcTag}
    </div>

    <!-- Resumen general -->
    <div style="display:flex;flex-wrap:wrap;gap:10px;margin-bottom:16px">
      <!-- Gauge cobrado -->
      <div style="background:#f5f3f8;border-radius:12px;padding:12px 14px;flex:1;display:flex;align-items:center;gap:12px;border:1px solid #e0dce8">
        <div style="position:relative;width:56px;height:56px;flex-shrink:0">
          ${(()=>{
            const sz=56, sk=6, r=(sz-sk)/2, circ=2*Math.PI*r;
            const off = circ - (pctCobrado/100)*circ;
            return `<svg width="${sz}" height="${sz}" style="transform:rotate(-90deg)">
              <circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="#e8e3f0" stroke-width="${sk}"/>
              <circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="${cobradoColor}" stroke-width="${sk}"
                stroke-dasharray="${circ}" stroke-dashoffset="${off}" stroke-linecap="round"
                style="transition:stroke-dashoffset 1s ease;filter:drop-shadow(0 0 4px ${cobradoColor}44)"/>
            </svg>
            <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;line-height:1">
              <div style="font-family:'Space Mono',monospace;font-size:.65rem;font-weight:800;color:${cobradoColor}">${pctCobrado}%</div>
            </div>`;
          })()}
        </div>
        <div style="flex:1;min-width:0">
          <div style="font-size:.52rem;color:var(--text-dim);font-weight:700;text-transform:uppercase;letter-spacing:.4px">Cobrado del total</div>
          <div style="font-family:'Space Mono',monospace;font-size:.85rem;font-weight:800;color:${cobradoColor};margin-top:2px">${fmtGs(totalCobrado)}</div>
          <div style="font-size:.52rem;color:var(--text-dim);margin-top:2px">Pendiente: ${fmtGs(totalPend)}</div>
        </div>
      </div>
      <!-- Mini cards totales -->
      <div style="display:flex;flex-direction:column;gap:6px;flex:1">
        <div style="background:#10b98115;border-radius:8px;padding:8px 12px;border:1px solid #10b98133;display:flex;justify-content:space-between;align-items:center">
          <span style="font-size:.55rem;color:#10b981;font-weight:700;text-transform:uppercase">✅ Cobrado</span>
          <span style="font-family:'Space Mono',monospace;font-size:.75rem;font-weight:800;color:#10b981">${fmtGs(totalCobrado)}</span>
        </div>
        <div style="background:#ef444415;border-radius:8px;padding:8px 12px;border:1px solid #ef444433;display:flex;justify-content:space-between;align-items:center">
          <span style="font-size:.55rem;color:#ef4444;font-weight:700;text-transform:uppercase">⏳ Pendiente</span>
          <span style="font-family:'Space Mono',monospace;font-size:.75rem;font-weight:800;color:#ef4444">${fmtGs(totalPend)}</span>
        </div>
        <div style="background:#62309815;border-radius:8px;padding:8px 12px;border:1px solid #62309833;display:flex;justify-content:space-between;align-items:center">
          <span style="font-size:.55rem;color:#623098;font-weight:700;text-transform:uppercase">💼 Total cartera</span>
          <span style="font-family:'Space Mono',monospace;font-size:.75rem;font-weight:800;color:#623098">${fmtGs(totalCobrar)}</span>
        </div>
      </div>
    </div>

    <!-- Indicador mora Randy -->
    ${(()=>{
      const clientesConDatos = data.clientes.filter(c => c.totalACobrar > 0);
      if(clientesConDatos.length === 0) return '';
      const moraPct = c => c.totalACobrar > 0 ? Math.round(((c.totalACobrar - c.cobrado) / c.totalACobrar) * 100) : 0;
      const items = clientesConDatos.map(c => {
        const mp = moraPct(c);
        const color = mp <= 30 ? '#10b981' : mp <= 50 ? '#f59e0b' : '#ef4444';
        const icon  = mp <= 30 ? '✅' : mp <= 50 ? '⚠️' : '🔴';
        return `<div style="display:flex;flex-wrap:wrap;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #f0eef5">
          <div style="flex:1;font-size:.65rem;font-weight:700;color:#1a1a2e">${c.nombre}</div>
          <div style="font-size:.55rem;font-weight:700;color:${color}">${icon} ${mp}% mora</div>
          <div style="width:60px;height:5px;background:#e8e3f0;border-radius:3px;overflow:hidden">
            <div style="height:100%;width:${Math.min(mp,100)}%;background:${color};border-radius:3px"></div>
          </div>
        </div>`;
      }).join('');
      return `<div style="background:#f9f7fc;border-radius:10px;padding:10px 12px;margin-bottom:12px;border:1px solid #e0dce8">
        <div style="font-size:.55rem;font-weight:800;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">
          📊 Mora por cartera — meta &lt;30%
        </div>
        ${items}
      </div>`;
    })()}
    <!-- Clientes -->
    <div style="display:flex;flex-direction:column;gap:8px">
      ${data.clientes.map(renderCliente).join('')}
    </div>


  </div>`;
}
